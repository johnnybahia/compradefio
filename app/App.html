<script>
/* ============================================================
   App.html — lógica do cliente (Web App Marfim)
   ============================================================ */

var TOKEN_KEY = 'marfim_token';
var sessao = { token: null, nome: null, papel: null, unidade: null, unidades: [] };

/* ---- ponte com o servidor (google.script.run → Promise) ---- */
function chamar(fn) {
  var args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function (resolve, reject) {
    var r = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
    if (typeof r[fn] !== 'function') {
      reject(new Error('Função "' + fn + '" não existe no servidor. ' +
        'Atualize os arquivos .gs (Analise, Associacao, Config) e publique uma NOVA versão da implantação.'));
      return;
    }
    r[fn].apply(r, args);
  });
}

/* ------------------------- inicialização ------------------------- */
document.addEventListener('DOMContentLoaded', function () {
  document.getElementById('form-login').addEventListener('submit', aoEntrar);
  document.getElementById('btn-sair').addEventListener('click', sair);

  var t = localStorage.getItem(TOKEN_KEY);
  if (!t) return mostrarLogin();
  chamar('validarSessao', t).then(function (r) {
    if (r && r.ok) {
      sessao = { token: t, nome: r.nome, papel: r.papel, unidade: r.unidade, unidades: r.unidades || [] };
      abrirApp();
    } else {
      localStorage.removeItem(TOKEN_KEY);
      mostrarLogin();
    }
  }).catch(mostrarLogin);
});

/* ----------------------------- login ----------------------------- */
function aoEntrar(e) {
  e.preventDefault();
  var btn = document.getElementById('btn-entrar');
  var erro = document.getElementById('erro-login');
  var usuario = document.getElementById('in-usuario').value.trim();
  var senha = document.getElementById('in-senha').value;
  erro.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Entrando…';

  chamar('login', usuario, senha).then(function (r) {
    btn.disabled = false;
    btn.textContent = 'Entrar';
    if (r.ok) {
      sessao = { token: r.token, nome: r.nome, papel: r.papel, unidade: r.unidade, unidades: r.unidades || [] };
      localStorage.setItem(TOKEN_KEY, r.token);
      document.getElementById('in-senha').value = '';
      abrirApp();
    } else {
      erro.textContent = r.erro || 'Não foi possível entrar.';
    }
  }).catch(function (err) {
    btn.disabled = false;
    btn.textContent = 'Entrar';
    erro.textContent = (err && err.message)
      ? ('Erro: ' + err.message)
      : 'Falha de conexão. Tente novamente.';
  });
}

function sair() {
  localStorage.removeItem(TOKEN_KEY);
  sessao = { token: null, nome: null, papel: null };
  mostrarLogin();
}

function mostrarLogin() {
  document.getElementById('splash').classList.add('oculto');
  document.getElementById('app').classList.add('oculto');
  document.getElementById('tela-login').classList.remove('oculto');
}

/* --------------------------- app shell --------------------------- */
var ROTULO_PAPEL = {
  master: 'Master', tingimento: 'Tingimento',
  almoxarifado1: 'Almoxarifado 1', almoxarifado2: 'Almoxarifado 2'
};

/* Menu por papel. O master enxerga tudo; cada operador só o que é dele. */
var MENUS = {
  master: [
    { id: 'analise',    rotulo: 'Análise de Compra',  render: viewAnalise },
    { id: 'tingimento', rotulo: 'Tingimento',          render: viewTingimento },
    { id: 'consulta',   rotulo: 'Consulta Estoque',    render: viewConsultaEstoque },
    { id: 'importar',   rotulo: 'Importar Embarque',   render: viewImportarEmbarque },
    { id: 'recebimento',rotulo: 'Recebimento',         render: emConstrucao('Recebimento (Almoxarifado 2)') },
    { id: 'usuarios',   rotulo: 'Usuários',            render: emConstrucao('Cadastro de usuários') }
  ],
  tingimento: [
    { id: 'tingimento', rotulo: 'Tingimento',          render: viewTingimento },
    { id: 'consulta',   rotulo: 'Consulta Estoque',    render: viewConsultaEstoque }
  ],
  almoxarifado1: [
    { id: 'importar',   rotulo: 'Importar Embarque',   render: viewImportarEmbarque },
    { id: 'embarques',  rotulo: 'Confirmar Embarque',  render: emConstrucao('Confirmação de Embarque') },
    { id: 'consulta',   rotulo: 'Consulta Estoque',    render: viewConsultaEstoque }
  ],
  almoxarifado2: [
    { id: 'recebimento',rotulo: 'Confirmar Recebimento', render: emConstrucao('Confirmação de Recebimento') },
    { id: 'consulta',   rotulo: 'Consulta Estoque',    render: viewConsultaEstoque }
  ]
};

/** Navega para um item de menu pelo id (usado após gerar a compra). */
function irParaMenu(id) {
  var itens = MENUS[sessao.papel] || [];
  var botoes = document.querySelectorAll('#menu button');
  for (var i = 0; i < itens.length; i++) {
    if (itens[i].id === id) { selecionar(itens[i], botoes[i]); return; }
  }
}

function abrirApp() {
  document.getElementById('splash').classList.add('oculto');
  document.getElementById('tela-login').classList.add('oculto');
  document.getElementById('app').classList.remove('oculto');
  document.getElementById('lbl-nome').textContent = sessao.nome || '';
  document.getElementById('lbl-papel').textContent = ROTULO_PAPEL[sessao.papel] || sessao.papel;
  renderSeletorUnidade();

  var itens = MENUS[sessao.papel] || [];
  var nav = document.getElementById('menu');
  nav.innerHTML = '';
  itens.forEach(function (item, i) {
    var b = document.createElement('button');
    b.textContent = item.rotulo;
    b.onclick = function () { selecionar(item, b); };
    nav.appendChild(b);
    if (i === 0) selecionar(item, b);
  });
}

/* ------------------------- seletor de unidade ------------------------- */
/* Uma unidade = uma planilha/empresa (Ceará, Bahia...). Trocar não recarrega
 * a página: pega um token novo já com a unidade escolhida e volta pro app. */
function renderSeletorUnidade() {
  var sel = document.getElementById('sel-unidade');
  var unidades = sessao.unidades || [];
  if (unidades.length < 2) { sel.style.display = 'none'; return; }
  sel.style.display = '';
  sel.innerHTML = unidades.map(function (u) {
    return '<option value="' + u.id + '">' + u.rotulo + '</option>';
  }).join('');
  sel.value = sessao.unidade ? sessao.unidade.id : unidades[0].id;
  sel.onchange = function () { trocarUnidadeAtiva(sel.value); };
}

function trocarUnidadeAtiva(unidadeId) {
  var sel = document.getElementById('sel-unidade');
  sel.disabled = true;
  chamar('trocarUnidade', sessao.token, unidadeId).then(function (r) {
    sel.disabled = false;
    if (!r || !r.ok) return;
    sessao.token = r.token;
    sessao.unidade = r.unidade;
    localStorage.setItem(TOKEN_KEY, r.token);
    // Zera os dados carregados da unidade anterior antes de reabrir — cada
    // unidade tem seu próprio estoque/pedidos, não faz sentido misturar.
    estadoAnalise = { dataInicio: null, dataFim: null, kgBase: '20', itens: [], mensagem: '', novosItens: [] };
    estadoTingimento = { linhas: [] };
    pedidoInfo = { numero: null, data: null };
    abrirApp();
  }).catch(function (err) {
    sel.disabled = false;
    alert((err && err.message) ? err.message : 'Não foi possível trocar de unidade.');
    sel.value = sessao.unidade ? sessao.unidade.id : sel.value;
  });
}

function selecionar(item, botao) {
  Array.prototype.forEach.call(
    document.querySelectorAll('#menu button'),
    function (b) { b.classList.remove('ativo'); });
  if (botao) botao.classList.add('ativo');
  var alvo = document.getElementById('conteudo');
  alvo.innerHTML = '';
  item.render(alvo);
}

/* Trata erro de sessão expirada em qualquer chamada de dados. */
function tratarErro(err) {
  var msg = (err && err.message) ? err.message : String(err);
  if (/sess[aã]o expirada/i.test(msg)) { sair(); return null; }
  return msg;
}

/* -------------------------- view: análise ------------------------- */
function ymd(d) {
  var m = ('0' + (d.getMonth() + 1)).slice(-2);
  var dia = ('0' + d.getDate()).slice(-2);
  return d.getFullYear() + '-' + m + '-' + dia;
}

// Estado da análise, preservado enquanto a sessão estiver aberta.
var estadoAnalise = { dataInicio: null, dataFim: null, kgBase: '20', itens: [], mensagem: '', novosItens: [] };

function viewAnalise(alvo) {
  var hoje = new Date();
  var fimPadrao = ymd(hoje);
  var inicioPadrao = ymd(new Date(hoje.getFullYear(), hoje.getMonth() - 3, hoje.getDate()));
  var vi = estadoAnalise.dataInicio || inicioPadrao;
  var vf = estadoAnalise.dataFim || fimPadrao;
  var vk = estadoAnalise.kgBase || '20';
  alvo.innerHTML =
    '<section class="painel">' +
      '<h2>Análise de Estoque para Compra</h2>' +
      '<p class="desc">Escolha o período. O sistema lista o <b>saldo final</b> de ' +
      'todos os itens que tiveram lançamento nesse período e o <b>consumo médio</b> ' +
      '(saídas dos últimos 3 meses ÷ 3). O que já está <b>em viagem</b> (embarcado ' +
      'e ainda não chegado) é somado ao saldo para não pedir compra à toa. Itens com ' +
      'saldo <b>igual ou abaixo</b> do valor base (kg) ficam destacados. <b>Marque</b> ' +
      'os itens que quer comprar e depois siga para a compra automática.</p>' +
      '<div class="linha-form">' +
        '<div class="campo">' +
          '<label for="data-inicio">Data inicial</label>' +
          '<input type="date" id="data-inicio" value="' + vi + '">' +
        '</div>' +
        '<div class="campo">' +
          '<label for="data-fim">Data final</label>' +
          '<input type="date" id="data-fim" value="' + vf + '">' +
        '</div>' +
        '<div class="campo">' +
          '<label for="kg-base">Destacar saldo ≤ (kg)</label>' +
          '<input type="number" id="kg-base" value="' + vk + '" step="any" style="max-width:130px">' +
        '</div>' +
        '<button class="btn-principal" id="btn-analisar">Analisar estoque</button>' +
      '</div>' +
      '<div id="analise-msg"></div>' +
    '</section>' +
    '<section class="painel" id="painel-pendencias" style="display:none">' +
      '<h2>Pendências de embarque</h2>' +
      '<p class="desc">Embarques com item(ns) já lançado(s) no estoque, mas outro(s) do ' +
      'mesmo nº ainda não — pode ser esquecimento na entrada do estoque ou erro de digitação. ' +
      'Some ao lançar o item no estoque para sair sozinho desta lista.</p>' +
      '<div class="tabela-wrap" id="tabela-pendencias"></div>' +
    '</section>' +
    '<section class="painel" id="painel-novos-associacao" style="display:none">' +
      '<h2>Itens novos cadastrados na Associação</h2>' +
      '<p class="desc">Código que apareceu pela primeira vez na produção — o sistema já ' +
      'cadastrou um nome padrão sozinho (um palpite). Confira; se algum estiver errado, ' +
      'corrija o texto e clique em Salvar — a correção vale para sempre, não precisa repetir.</p>' +
      '<div class="tabela-wrap" id="tabela-novos-associacao"></div>' +
    '</section>' +
    '<section class="painel" id="painel-lista" style="display:none">' +
      '<h2>Itens do período</h2>' +
      '<p class="desc">Marque a caixa <b>Comprar</b> nos itens que devem ' +
      'entrar na compra. Use o botão ↻ ao lado da <b>data limite de embarque</b> ' +
      'para reconsultar só aquele item, caso a data tenha sido alterada na ' +
      'outra planilha depois que esta lista foi carregada. Encontrou um ' +
      'estoque avulso, fora de qualquer controle? Digite em <b>Estoque encontrado</b> — ' +
      'ele soma ao saldo e recalcula a necessidade de compra (máquinas/total) na hora.</p>' +
      '<div id="lista-msg"></div>' +
      '<div class="tabela-wrap" id="tabela-lista"></div>' +
      '<div style="margin-top:16px">' +
        '<button class="btn-principal" id="btn-prosseguir" style="display:none">' +
        'Prosseguir com a compra</button>' +
      '</div>' +
      '<div id="prosseguir-msg"></div>' +
    '</section>' +
    '<section class="painel" id="painel-relacao" style="display:none">' +
      '<h2>Relação de compra (histórico acumulado)</h2>' +
      '<p class="desc">Cada compra gerada se <b>acrescenta</b> aqui — o tingimento nem sempre ' +
      'consegue fazer tudo de uma vez, então os pedidos vão se acumulando até serem ' +
      'processados. Use "Excluir relatório" só quando quiser mesmo apagar tudo e recomeçar do zero.</p>' +
      '<div class="tabela-wrap" id="tabela-relacao"></div>' +
      '<div style="margin-top:16px">' +
        '<button class="btn-sair" id="btn-excluir-relacao" style="color:var(--erro);border-color:#F2C6C3">' +
        'Excluir relatório e começar do zero</button>' +
      '</div>' +
      '<div id="excluir-relacao-msg"></div>' +
    '</section>';

  document.getElementById('btn-analisar').onclick = analisarEstoque;
  document.getElementById('btn-prosseguir').onclick = prosseguirCompra;
  document.getElementById('btn-excluir-relacao').onclick = excluirRelacao;
  document.getElementById('kg-base').addEventListener('input', function () {
    estadoAnalise.kgBase = document.getElementById('kg-base').value;
    reaplicarDestaque();
  });

  // Restaura a lista já analisada na sessão e recarrega a última relação salva.
  if (estadoAnalise.itens.length) {
    document.getElementById('analise-msg').innerHTML =
      '<div class="aviso ok">' + (estadoAnalise.mensagem || '') + '</div>';
    renderLista(estadoAnalise.itens);
  }
  renderNovosAssociacao(estadoAnalise.novosItens);
  carregarUltimaRelacao();
  carregarPendencias();
}

/** Carrega a aba de pendências de embarque a qualquer momento (sem precisar rodar a análise). */
function carregarPendencias() {
  chamar('listarPendenciasEmbarque', sessao.token)
    .then(function (r) { renderPendencias(r.linhas); })
    .catch(function () { /* silencioso — só não mostra o painel */ });
}

function renderPendencias(linhas) {
  var painel = document.getElementById('painel-pendencias');
  var wrap = document.getElementById('tabela-pendencias');
  if (!painel || !wrap) return;
  if (!linhas || !linhas.length) { painel.style.display = 'none'; return; }
  painel.style.display = '';
  var body = linhas.map(function (l) {
    return '<tr class="destaque">' +
      '<td>' + (l.item || '—') + '</td>' +
      '<td>' + (l.embarque || '—') + '</td>' +
      '<td style="text-align:right">' + num(l.quantidade) + '</td>' +
      '<td>' + (l.dataEmbarque || '—') + '</td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' +
      '<th style="width:20%">Item</th><th style="width:15%">Embarque</th>' +
      '<th style="text-align:right;width:15%">Quantidade</th><th style="width:20%">Data do embarque</th>' +
    '</tr></thead><tbody>' + body + '</tbody></table>';
}

/**
 * Itens que acabaram de ser cadastrados sozinhos na ASSOCIAÇÃO (nome
 * "palpitado" por _normalizarCor). Mostra o código + nome num campo
 * editável; o master confere e, se precisar, corrige e salva — a correção
 * fica valendo para sempre (grava direto na aba ASSOCIAÇÃO).
 */
function renderNovosAssociacao(itens) {
  var painel = document.getElementById('painel-novos-associacao');
  var wrap = document.getElementById('tabela-novos-associacao');
  if (!painel || !wrap) return;
  if (!itens || !itens.length) { painel.style.display = 'none'; return; }
  painel.style.display = '';
  var body = itens.map(function (it, i) {
    return '<tr>' +
      '<td>' + escAttr(it.codigo) + '</td>' +
      '<td><input type="text" class="in-nome-associacao" value="' + escAttr(it.nome) + '" style="width:100%"></td>' +
      '<td><button class="btn-principal btn-salvar-associacao" type="button" data-codigo="' + escAttr(it.codigo) + '" data-idx="' + i + '">Salvar</button></td>' +
      '<td><span id="msg-associacao-' + i + '" style="font-size:13px"></span></td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' +
      '<th style="width:18%">Código</th><th>Nome cadastrado</th><th style="width:10%"></th><th style="width:22%"></th>' +
    '</tr></thead><tbody>' + body + '</tbody></table>';
  Array.prototype.forEach.call(wrap.querySelectorAll('.btn-salvar-associacao'), function (btn) {
    btn.onclick = function () { salvarCorrecaoAssociacao(btn); };
  });
}

function salvarCorrecaoAssociacao(btn) {
  var tr = btn.parentNode.parentNode; // <td><button></td></tr>
  var input = tr.querySelector('.in-nome-associacao');
  var codigo = btn.getAttribute('data-codigo');
  var idx = btn.getAttribute('data-idx');
  var nome = input.value.trim();
  var msgEl = document.getElementById('msg-associacao-' + idx);
  if (!nome) { msgEl.innerHTML = '<span style="color:var(--erro)">Informe o nome.</span>'; return; }

  btn.disabled = true;
  chamar('corrigirAssociacao', sessao.token, codigo, nome)
    .then(function () {
      btn.disabled = false;
      msgEl.textContent = 'Salvo.';
      // mantém em sincronia caso o mesmo código apareça na lista principal
      (estadoAnalise.itens || []).forEach(function (it) {
        if (it.item === codigo) it.descricao = nome;
      });
    })
    .catch(function (err) {
      btn.disabled = false;
      var m = tratarErro(err);
      msgEl.innerHTML = '<span style="color:var(--erro)">' + (m || 'Erro ao salvar.') + '</span>';
    });
}

/** Modal simples de confirmação (evita depender de confirm()/alert() nativos, que o
 * sandbox do HtmlService pode bloquear). callback(true) se clicar no botão em
 * destaque (rotuloDestaque), callback(false) se clicar no outro (rotuloSecundario). */
function confirmarModal(titulo, texto, rotuloDestaque, rotuloSecundario, callback) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,33,.45);' +
    'display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';
  overlay.innerHTML =
    '<div style="background:#fff;border-radius:14px;max-width:440px;width:100%;' +
      'padding:26px 26px 22px;box-shadow:0 20px 50px rgba(0,0,0,.28)">' +
      '<h3 style="margin:0 0 10px;color:#0B4576;font-size:17px">' + titulo + '</h3>' +
      '<p style="margin:0 0 22px;color:#475569;font-size:14px;line-height:1.5">' + texto + '</p>' +
      '<div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap">' +
        '<button id="modal-btn-secundario" style="padding:10px 16px;border:1px solid #D8E0E8;' +
          'border-radius:8px;background:#fff;cursor:pointer;font-size:14px">' + rotuloSecundario + '</button>' +
        '<button id="modal-btn-destaque" style="padding:10px 18px;border:none;border-radius:8px;' +
          'background:#0F5FA0;color:#fff;cursor:pointer;font-size:14px;font-weight:600">' + rotuloDestaque + '</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  overlay.querySelector('#modal-btn-destaque').onclick = function () { document.body.removeChild(overlay); callback(true); };
  overlay.querySelector('#modal-btn-secundario').onclick = function () { document.body.removeChild(overlay); callback(false); };
}

function analisarEstoque() {
  var btn = document.getElementById('btn-analisar');
  var dataInicio = document.getElementById('data-inicio').value;
  var dataFim = document.getElementById('data-fim').value;
  var msg = document.getElementById('analise-msg');
  if (!dataInicio || !dataFim) {
    msg.innerHTML = '<div class="aviso erro">Selecione as datas inicial e final.</div>'; return;
  }
  if (dataInicio > dataFim) {
    msg.innerHTML = '<div class="aviso erro">A data inicial não pode ser maior que a final.</div>'; return;
  }
  confirmarModal(
    'Relatório de embarque pendente?',
    'Você tem algum relatório de embarque (PDF) para lançar antes de continuar? ' +
    'Se tiver, importe primeiro em <b>"Importar Embarque"</b> e volte aqui depois. ' +
    'Se não, a análise segue normalmente — o sistema já confere sozinho quais ' +
    'embarques chegaram.',
    'Não tenho, pode analisar', 'Sim, tenho',
    function (semPendencia) {
      if (!semPendencia) {
        msg.innerHTML = '<div class="aviso">Importe o relatório em "Importar Embarque" e volte aqui depois para analisar.</div>';
        return;
      }
      prosseguirAnalisarEstoque(dataInicio, dataFim, btn, msg);
    }
  );
}

function prosseguirAnalisarEstoque(dataInicio, dataFim, btn, msg) {
  btn.disabled = true;
  msg.innerHTML = '<div class="aviso"><span class="carregando">Lendo o estoque…</span></div>';
  document.getElementById('painel-lista').style.display = 'none';
  document.getElementById('prosseguir-msg').innerHTML = '';

  chamar('listarItensParaAnalise', sessao.token, { dataInicio: dataInicio, dataFim: dataFim })
    .then(function (r) {
      btn.disabled = false;
      estadoAnalise.dataInicio = dataInicio;
      estadoAnalise.dataFim = dataFim;
      estadoAnalise.kgBase = document.getElementById('kg-base').value;
      estadoAnalise.itens = r.itens || [];
      estadoAnalise.mensagem = r.mensagem || '';
      estadoAnalise.novosItens = r.novosItens || [];
      msg.innerHTML = '<div class="aviso ok">' + r.mensagem + '</div>';
      renderLista(estadoAnalise.itens);
      renderNovosAssociacao(estadoAnalise.novosItens);
      renderPendencias(r.pendencias);
    })
    .catch(function (err) {
      btn.disabled = false;
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

function num(v) {
  if (v === '' || v === null || v === undefined) return '—';
  var n = Number(v);
  return isNaN(n) ? v : n.toLocaleString('pt-BR');
}

function renderLista(itens) {
  var painel = document.getElementById('painel-lista');
  var wrap = document.getElementById('tabela-lista');
  var btnPros = document.getElementById('btn-prosseguir');
  painel.style.display = '';

  if (!itens.length) {
    wrap.innerHTML = '<div class="vazio">Nenhum item lançado no período informado.</div>';
    btnPros.style.display = 'none';
    return;
  }

  var body = itens.map(function (it, i) {
    var desc = it.descricao
      ? it.descricao
      : '<span class="sem-desc">— ' + (it.motivo || 'sem descrição') + '</span>';

        'value="' + (it.estoqueEncontrado ? it.estoqueEncontrado : '') + '" placeholder="0" ' +

      '<td class="cel-maquinas" data-idx="' + i + '">' + (it.maquinas ? it.maquinas : '—') + '</td>' +

      '<th style="text-align:right;width:7%">Estoque encontrado</th>' +
      '<th style="text-align:right;width:5%">Consumo médio</th>' +
      '<th style="width:9%">Tipo de fio</th>' +
      '<th style="width:6%">Máquinas</th>' +
      '<th style="text-align:right;width:5%">Total (kg)</th>' +
      '<th style="width:9%">Data limite embarque</th>' +
      '<th style="width:6%">Observação</th>' +
    '</tr></thead><tbody>' + body + '</tbody></table>';
  btnPros.style.display = '';

  // Edições da análise ficam só na memória (persistem ao "Prosseguir").
  Array.prototype.forEach.call(wrap.querySelectorAll('.data-input'), function (inp) {
    inp.addEventListener('change', function () {
      estadoAnalise.itens[Number(inp.getAttribute('data-idx'))].dataLimite = isoParaBR(inp.value);
    });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.obs-input'), function (inp) {
    inp.addEventListener('change', function () {
      estadoAnalise.itens[Number(inp.getAttribute('data-idx'))].obs = inp.value;
    });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.btn-atualizar-data'), function (btn) {
    btn.addEventListener('click', function () {
      atualizarDataLimiteLinha(Number(btn.getAttribute('data-idx')), btn);
    });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.estoque-input'), function (inp) {
    inp.addEventListener('change', function () {
      atualizarEstoqueEncontradoLinha(Number(inp.getAttribute('data-idx')), inp);
    });
  });
  reaplicarDestaque();
}

/** Soma o "estoque encontrado" ao saldo + em viagem e reconsulta o pedido de
 * tingimento daquele item, para recalcular a necessidade de compra na hora. */
function atualizarEstoqueEncontradoLinha(idx, inp) {
  var it = estadoAnalise.itens[idx];
  if (!it) return;
  var msg = document.getElementById('lista-msg');
  it.estoqueEncontrado = inp.value === '' ? 0 : Number(inp.value) || 0;
  reaplicarDestaque(); // o realce (saldo ≤ base) já reflete o valor digitado, na hora

  inp.disabled = true;
  chamar('recalcularTingimentoItem', sessao.token, {
    item: it.item, saldo: it.saldo, emViagem: it.emViagem,
    estoqueEncontrado: it.estoqueEncontrado, consumoMedio: it.consumoMedio
  })
    .then(function (r) {
      inp.disabled = false;
      it.tipoFio = r.tipoFio || '';
      it.maquinas = r.maquinas || '';
      it.totalTingimento = r.totalTingimento || 0;
      var tdTipo = document.querySelector('.cel-tipofio[data-idx="' + idx + '"]');
      var tdMaq = document.querySelector('.cel-maquinas[data-idx="' + idx + '"]');
      var tdTot = document.querySelector('.cel-total[data-idx="' + idx + '"]');
      if (tdTipo) tdTipo.textContent = it.tipoFio || '—';
      if (tdMaq) tdMaq.textContent = it.maquinas || '—';
      if (tdTot) tdTot.textContent = it.totalTingimento ? num(it.totalTingimento) : '—';
      if (msg) msg.innerHTML = '';
    })
    .catch(function (err) {
      inp.disabled = false;
      var m = tratarErro(err);
      if (m && msg) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

/** Reconsulta, na hora, a data limite de embarque de UM item (vem de outra
 * planilha e pode ter mudado enquanto esta lista já estava na tela). */
function atualizarDataLimiteLinha(idx, btn) {
  var it = estadoAnalise.itens[idx];
  if (!it || !it.item) return;
  var msg = document.getElementById('lista-msg');
  btn.disabled = true;
  btn.textContent = '…';
  chamar('consultarDataLimiteItem', sessao.token, it.item)
    .then(function (r) {
      btn.disabled = false;
      btn.textContent = '↻';
      it.dataLimite = r.dataLimite || '';
      var inp = document.querySelector('.data-input[data-idx="' + idx + '"]');
      if (inp) inp.value = brParaISO(it.dataLimite);
      if (msg) msg.innerHTML = '';
    })
    .catch(function (err) {
      btn.disabled = false;
      btn.textContent = '↻';
      var m = tratarErro(err);
      if (m && msg) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

/** Realça as linhas cujo saldo final é ≤ ao valor base (kg), sem recriar a tabela. */
function reaplicarDestaque() {
  var campo = document.getElementById('kg-base');
  var base = campo ? parseFloat(campo.value) : NaN;
  var linhas = document.querySelectorAll('#tabela-lista tbody tr');
  Array.prototype.forEach.call(linhas, function (tr) {
    var it = estadoAnalise.itens[Number(tr.getAttribute('data-idx'))];
    var saldo = it ? Number(it.saldo) + Number(it.emViagem || 0) + Number(it.estoqueEncontrado || 0) : NaN;
    if (!isNaN(base) && !isNaN(saldo) && saldo <= base) {
      tr.classList.add('destaque');
    } else {
      tr.classList.remove('destaque');
    }
  });
}

function prosseguirCompra() {
  var msg = document.getElementById('prosseguir-msg');
  var caixas = document.querySelectorAll('#tabela-lista .sel-compra');
  var manter = [];
  Array.prototype.forEach.call(caixas, function (chk) {
    if (chk.checked) manter.push(estadoAnalise.itens[Number(chk.getAttribute('data-idx'))]);
  });
  if (!manter.length) {
    msg.innerHTML = '<div class="aviso erro">Marque ao menos um item para comprar.</div>';
    return;
  }
  var btn = document.getElementById('btn-prosseguir');
  btn.disabled = true;
  msg.innerHTML = '<div class="aviso"><span class="carregando">Preparando a compra…</span></div>';

  chamar('gerarRelacaoDeCompra', sessao.token, { itens: manter })
    .then(function (r) {
      btn.disabled = false;
      carregarUltimaRelacao();
      irParaMenu('tingimento'); // abre a lista de tingimento com os itens escolhidos
    })
    .catch(function (err) {
      btn.disabled = false;
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

/** Recarrega e exibe a última relação de compra gravada no banco. */
function carregarUltimaRelacao() {
  chamar('obterRelacaoDeCompra', sessao.token)
    .then(function (r) { renderRelacaoSalva(r.linhas); })
    .catch(function () { /* silencioso — só não mostra o painel */ });
}

function renderRelacaoSalva(linhas) {
  var painel = document.getElementById('painel-relacao');
  var wrap = document.getElementById('tabela-relacao');
  if (!painel || !wrap) return;
  if (!linhas || !linhas.length) { painel.style.display = 'none'; return; }
  painel.style.display = '';
  var cols = ['ITEM', 'DESCRICAO', 'CLIENTE', 'TIPO_FIO', 'SALDO', 'EM_VIAGEM', 'ESTOQUE_ENCONTRADO',
              'CONSUMO_MEDIO', 'MAQUINAS', 'SUGERIDO', 'DATA_LIMITE', 'OBS', 'STATUS', 'GERADO_EM'];
  var rot = {
    ITEM: 'Item', DESCRICAO: 'Descrição', CLIENTE: 'Cliente', TIPO_FIO: 'Tipo de fio',
    SALDO: 'Saldo final', EM_VIAGEM: 'Em viagem', ESTOQUE_ENCONTRADO: 'Estoque encontrado',
    CONSUMO_MEDIO: 'Consumo médio', MAQUINAS: 'Máquinas',
    SUGERIDO: 'Total (kg)', DATA_LIMITE: 'Data limite embarque', OBS: 'Observação',
    STATUS: 'Status', GERADO_EM: 'Gerado em'
  };
  var numericas = { SALDO: 1, EM_VIAGEM: 1, ESTOQUE_ENCONTRADO: 1, CONSUMO_MEDIO: 1, SUGERIDO: 1 };
  var th = cols.map(function (c) { return '<th>' + rot[c] + '</th>'; }).join('');
  var body = linhas.map(function (l) {
    return '<tr>' + cols.map(function (c) {
      if (numericas[c]) return '<td>' + num(l[c]) + '</td>';
      var v = l[c];
      if (c === 'DATA_LIMITE') v = soDataBR(v);
      else if (c === 'GERADO_EM') v = soDataHoraBR(v);
      return '<td>' + (v !== '' && v != null ? v : '—') + '</td>';
    }).join('') + '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' + th + '</tr></thead><tbody>' + body + '</tbody></table>';
}

/** aaaa-MM-ddTHH:mm... (ISO) → dd/MM/aaaa HH:mm; devolve o valor original se não reconhecer. */
function soDataHoraBR(v) {
  var s = String(v == null ? '' : v);
  if (!s) return '';
  var d = new Date(s);
  if (isNaN(d.getTime())) return s;
  var dd = String(d.getDate()).padStart(2, '0');
  var mm = String(d.getMonth() + 1).padStart(2, '0');
  var hh = String(d.getHours()).padStart(2, '0');
  var mi = String(d.getMinutes()).padStart(2, '0');
  return dd + '/' + mm + '/' + d.getFullYear() + ' ' + hh + ':' + mi;
}

  );

function escAttr(s) {

    .replace(/&/g, '&amp;').replace(/"/g, '&quot;')

}

      '<td><input type="date" class="data-input" data-linha="' + l.linha + '" value="' +

  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.data-input'), function (inp) {

        var alvo = null;

        if (alvo) alvo.dataLimite = novaData;
        estadoTingimento.linhas = ordenarTingimentoPorDataLimite(estadoTingimento.linhas);

/** Ordena a lista do tingimento pela data limite de embarque, a mais próxima
 * primeiro (mesmo critério do servidor) — usada ao reordenar na tela depois
 * de editar uma data, sem precisar recarregar tudo do zero. */
function ordenarTingimentoPorDataLimite(linhas) {
  function ms(s) {
    var m = String(s == null ? '' : s).match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    return m ? new Date(+m[3], +m[2] - 1, +m[1]).getTime() : null;
  }
  return linhas.slice().sort(function (a, b) {
    var da = ms(a.dataLimite), db = ms(b.dataLimite);
    if (da == null && db == null) return 0;
    if (da == null) return 1;
    if (db == null) return -1;
    return da - db;
  });
}

/** Extrai só a data (dd/MM/aaaa) de um valor que pode vir como ISO/Date/texto. */
function soDataBR(v) {
  var s = String(v == null ? '' : v);
  var m = s.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (m) return m[0];
  var iso = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return iso[3] + '/' + iso[2] + '/' + iso[1];
  return s;
}

/** dd/MM/aaaa → aaaa-MM-dd (para o input date); '' se não reconhecer. */
function brParaISO(s) {
  var m = String(s == null ? '' : s).match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  return m ? m[3] + '-' + m[2] + '-' + m[1] : '';
}
/** aaaa-MM-dd → dd/MM/aaaa (para gravar como na planilha); '' se vazio. */
function isoParaBR(s) {
  var m = String(s == null ? '' : s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? m[3] + '/' + m[2] + '/' + m[1] : '';
}

function salvarCampoTing(inp, campo, valor, aoSalvar) {
  inp.style.borderColor = '#CBD5E1';
  chamar('salvarCampoTingimento', sessao.token, inp.getAttribute('data-linha'), campo, valor)
    .then(function () {
      inp.style.borderColor = '#1F9D55';
      if (aoSalvar) aoSalvar();
    })
    .catch(function (err) {
      inp.style.borderColor = '#D0342C';
      tratarErro(err);
    });
}

/* --------------------- view: Consulta de Estoque ------------------ */
function viewConsultaEstoque(alvo) {
  alvo.innerHTML =
    '<section class="painel">' +
      '<h2>Consulta de Estoque</h2>' +
      '<p class="desc">Busque um item para ver o histórico de movimentações, como está na aba ESTOQUE.</p>' +
      '<div class="linha-form">' +
        '<div class="campo" style="flex:1;min-width:220px">' +
          '<label for="consulta-item">Item</label>' +
          '<input type="text" id="consulta-item" list="itens-estoque" ' +
            'placeholder="Digite ou escolha um item" autocomplete="off">' +
          '<datalist id="itens-estoque"></datalist>' +
        '</div>' +
        '<button class="btn-principal" id="btn-consultar">Buscar</button>' +
      '</div>' +
      '<div id="consulta-msg"></div>' +
      '<div class="tabela-wrap" id="tabela-consulta"></div>' +
    '</section>';
  document.getElementById('btn-consultar').onclick = consultarEstoque;
  document.getElementById('consulta-item').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') consultarEstoque();
  });
  // Preenche o autocomplete com os itens do estoque.
  chamar('listarItensEstoque', sessao.token)
    .then(function (r) {
      var dl = document.getElementById('itens-estoque');
      if (!dl) return;
      dl.innerHTML = (r.itens || []).map(function (it) {
        return '<option value="' + escAttr(it) + '">';
      }).join('');
    })
    .catch(function () { /* silencioso — a busca por texto continua funcionando */ });
}

function consultarEstoque() {
  var termo = document.getElementById('consulta-item').value.trim();
  var msg = document.getElementById('consulta-msg');
  var wrap = document.getElementById('tabela-consulta');
  if (!termo) { msg.innerHTML = '<div class="aviso erro">Digite um item para buscar.</div>'; return; }
  msg.innerHTML = '<div class="aviso"><span class="carregando">Buscando…</span></div>';
  wrap.innerHTML = '';
  chamar('consultarHistoricoItem', sessao.token, termo)
    .then(function (r) {
      if (!r.linhas.length) {
        msg.innerHTML = '<div class="aviso">Nenhum registro encontrado para "' + termo + '".</div>';
        return;
      }
      msg.innerHTML = '<div class="aviso ok">' + r.total + ' registro(s)' +
        (r.truncado ? ' (mostrando os 1000 mais recentes)' : '') + '.</div>';
      renderHistorico(r.cabecalho, r.linhas);
    })
    .catch(function (err) {
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

function renderHistorico(cabecalho, linhas) {
  var wrap = document.getElementById('tabela-consulta');
  var th = cabecalho.map(function (c) { return '<th>' + c + '</th>'; }).join('');
  var body = linhas.map(function (row) {
    return '<tr>' + row.map(function (v) {
      return '<td>' + (v !== '' && v != null ? v : '—') + '</td>';
    }).join('') + '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' + th + '</tr></thead><tbody>' + body + '</tbody></table>';
}

/* ----------------- view: Importar Embarque (PDF) ------------------ */
var embarqueItens = [];

function viewImportarEmbarque(alvo) {
  alvo.innerHTML =
    '<section class="painel">' +
      '<h2>Importar Embarque (PDF)</h2>' +
      '<p class="desc">Selecione o PDF do relatório de embarque. O sistema lê e ' +
      'preenche a aba EMBARQUES (item, quantidade, nº do embarque e data). ' +
      'Itens não reconhecidos ficam destacados para você corrigir — e o sistema ' +
      'aprende para as próximas vezes.</p>' +
      '<div class="linha-form">' +
        '<div class="campo" style="flex:1;min-width:240px">' +
          '<label for="pdf-file">Arquivo PDF</label>' +
          '<input type="file" id="pdf-file" accept="application/pdf">' +
        '</div>' +
        '<button class="btn-principal" id="btn-ler-pdf">Ler PDF</button>' +
      '</div>' +
      '<div id="embarque-msg"></div>' +
      '<datalist id="itens-estoque-emb"></datalist>' +
    '</section>' +
    '<section class="painel" id="painel-embarque" style="display:none">' +
      '<h2>Conferência</h2>' +
      '<div class="linha-form">' +
        '<div class="campo"><label for="emb-doc">Nº do embarque</label>' +
          '<input type="text" id="emb-doc" style="max-width:140px"></div>' +
        '<div class="campo"><label for="emb-data">Data</label>' +
          '<input type="date" id="emb-data" style="max-width:170px"></div>' +
      '</div>' +
      '<div class="tabela-wrap" id="tabela-embarque"></div>' +
      '<div style="margin-top:16px">' +
        '<button class="btn-principal" id="btn-gravar-embarque">Confirmar e gravar</button>' +
      '</div>' +
      '<div id="gravar-embarque-msg"></div>' +
      '<details style="margin-top:18px">' +
        '<summary style="cursor:pointer;color:var(--texto-fraco);font-size:12px">Ver texto lido do PDF (conferência)</summary>' +
        '<pre id="embarque-texto-bruto" style="white-space:pre-wrap;font-size:11px;background:#F7FAFD;border:1px solid var(--borda);border-radius:8px;padding:10px;margin-top:8px;max-height:260px;overflow:auto"></pre>' +
      '</details>' +
    '</section>';

  document.getElementById('btn-ler-pdf').onclick = lerArquivoPdf;
  document.getElementById('btn-gravar-embarque').onclick = gravarEmbarqueConfirmado;

  // autocomplete de itens (para corrigir os não reconhecidos)
  chamar('listarItensEstoque', sessao.token).then(function (r) {
    var dl = document.getElementById('itens-estoque-emb');
    if (dl) dl.innerHTML = (r.itens || []).map(function (it) {
      return '<option value="' + escAttr(it) + '">';
    }).join('');
  }).catch(function () {});
}

function lerArquivoPdf() {
  var msg = document.getElementById('embarque-msg');
  var f = document.getElementById('pdf-file').files[0];
  if (!f) { msg.innerHTML = '<div class="aviso erro">Escolha um arquivo PDF.</div>'; return; }
  var btn = document.getElementById('btn-ler-pdf');
  btn.disabled = true;
  msg.innerHTML = '<div class="aviso"><span class="carregando">Lendo o PDF…</span></div>';
  var reader = new FileReader();
  reader.onload = function () {
    var b64 = String(reader.result).split(',')[1];
    chamar('analisarEmbarquePdf', sessao.token, b64, f.name)
      .then(function (r) {
        btn.disabled = false;
        embarqueItens = r.itens || [];
        document.getElementById('emb-doc').value = r.doc || '';
        document.getElementById('emb-data').value = brParaISO(r.data);
        var aviso = r.naoReconhecidos
          ? '<div class="aviso erro">' + r.naoReconhecidos + ' item(ns) não reconhecido(s). Corrija os destacados antes de gravar.</div>'
          : '<div class="aviso ok">' + embarqueItens.length + ' itens lidos. Confira e grave.</div>';
        msg.innerHTML = aviso;
        renderPreviewEmbarque(embarqueItens);
        document.getElementById('embarque-texto-bruto').textContent = r.textoBruto || '';
        document.getElementById('painel-embarque').style.display = '';
      })
      .catch(function (err) {
        btn.disabled = false;
        var m = tratarErro(err);
        if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
      });
  };
  reader.onerror = function () { btn.disabled = false; msg.innerHTML = '<div class="aviso erro">Falha ao ler o arquivo.</div>'; };
  reader.readAsDataURL(f);
}

function renderPreviewEmbarque(itens) {
  var wrap = document.getElementById('tabela-embarque');
  var body = itens.map(function (it, i) {
    var cls = it.ok ? '' : ' class="destaque"';
    var status = it.ok
      ? (it.motivo === 'aprendido' ? 'aprendido' : 'ok')
      : '<span class="sem-desc">' + (it.motivo || 'resolver') + '</span>';
    return '<tr' + cls + '>' +
      '<td><input class="item-emb obs-input" data-idx="' + i + '" list="itens-estoque-emb" value="' + escAttr(it.item || '') + '"></td>' +
      '<td style="text-align:right"><input type="number" class="qtd-emb obs-input" data-idx="' + i + '" value="' + (it.quantidade != null ? it.quantidade : '') + '" style="text-align:right"></td>' +
      '<td>' + (it.descricao || '—') + '</td>' +
      '<td>' + status + '</td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' +
      '<th style="width:24%">Item (col A)</th><th style="width:12%">Quantidade (col B)</th>' +
      '<th style="width:44%">Descrição no PDF</th><th style="width:20%">Status</th>' +
    '</tr></thead><tbody>' + body + '</tbody></table>';

  Array.prototype.forEach.call(wrap.querySelectorAll('.item-emb'), function (inp) {
    inp.addEventListener('input', function () { embarqueItens[Number(inp.getAttribute('data-idx'))].item = inp.value; });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.qtd-emb'), function (inp) {
    inp.addEventListener('input', function () { embarqueItens[Number(inp.getAttribute('data-idx'))].quantidade = inp.value; });
  });
}

function gravarEmbarqueConfirmado() {
  var msg = document.getElementById('gravar-embarque-msg');
  var doc = document.getElementById('emb-doc').value.trim();
  var data = isoParaBR(document.getElementById('emb-data').value);
  if (!doc) { msg.innerHTML = '<div class="aviso erro">Informe o nº do embarque.</div>'; return; }
  if (!data) { msg.innerHTML = '<div class="aviso erro">Informe a data.</div>'; return; }
  var pendentes = embarqueItens.filter(function (it) { return !it.item || !String(it.item).trim(); });
  if (pendentes.length) {
    msg.innerHTML = '<div class="aviso erro">Há ' + pendentes.length + ' item(ns) sem código. Preencha antes de gravar.</div>';
    return;
  }
  var btn = document.getElementById('btn-gravar-embarque');
  btn.disabled = true;
  msg.innerHTML = '<div class="aviso"><span class="carregando">Gravando…</span></div>';
  chamar('gravarEmbarque', sessao.token, { doc: doc, data: data, itens: embarqueItens })
    .then(function (r) {
      btn.disabled = false;
      msg.innerHTML = '<div class="aviso ok">' + r.gravados + ' item(ns) gravado(s) na aba EMBARQUES.</div>';
    })
    .catch(function (err) {
      btn.disabled = false;
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

        '<div class="em-construcao">' +

          '<h2>' + titulo + '</h2>' +
          '<p>Este módulo será desenvolvido nas próximas etapas do projeto.</p>' +

      '</section>';
  };
}
</script>
