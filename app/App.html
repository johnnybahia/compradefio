<script>
/* ============================================================
   App.html — lógica do cliente (Web App Marfim)
   ============================================================ */

var TOKEN_KEY = 'marfim_token';
var sessao = { token: null, nome: null, papel: null, unidade: null, unidades: [] };
// URL fixa do logo (mesmo link usado em Index.html/CONFIG.LOGO_URL e nos
// e-mails) — sem arquivo/base64 embutido; se cair, a tag <img> só se oculta.
var LOGO_URL = 'https://i.ibb.co/FGGjdsM/LOGO-MARFIM.jpg';

/* ---- ponte com o servidor (google.script.run → Promise) ---- */
function chamar(fn) {
  var args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function (resolve, reject) {
    var r = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
    if (typeof r[fn] !== 'function') {
      reject(new Error('Função "' + fn + '" não existe no servidor. ' +
        'Atualize os arquivos .gs (Analise, Associacao, Config) e publique uma NOVA versão da implantação.'));
      return;
    }
    r[fn].apply(r, args);
  });
}

/* ------------------------- inicialização ------------------------- */
document.addEventListener('DOMContentLoaded', function () {
  document.getElementById('form-login').addEventListener('submit', aoEntrar);
  document.getElementById('btn-sair').addEventListener('click', sair);

  var t = localStorage.getItem(TOKEN_KEY);
  if (!t) return mostrarLogin();
  chamar('validarSessao', t).then(function (r) {
    if (r && r.ok) {
      sessao = { token: t, nome: r.nome, papel: r.papel, unidade: r.unidade, unidades: r.unidades || [] };
      abrirApp();
    } else {
      localStorage.removeItem(TOKEN_KEY);
      mostrarLogin();
    }
  }).catch(mostrarLogin);
});

/* ----------------------------- login ----------------------------- */
function aoEntrar(e) {
  e.preventDefault();
  var btn = document.getElementById('btn-entrar');
  var erro = document.getElementById('erro-login');
  var usuario = document.getElementById('in-usuario').value.trim();
  var senha = document.getElementById('in-senha').value;
  erro.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Entrando…';

  chamar('login', usuario, senha).then(function (r) {
    btn.disabled = false;
    btn.textContent = 'Entrar';
    if (r.ok) {
      sessao = { token: r.token, nome: r.nome, papel: r.papel, unidade: r.unidade, unidades: r.unidades || [] };
      localStorage.setItem(TOKEN_KEY, r.token);
      document.getElementById('in-senha').value = '';
      abrirApp();
    } else {
      erro.textContent = r.erro || 'Não foi possível entrar.';
    }
  }).catch(function (err) {
    btn.disabled = false;
    btn.textContent = 'Entrar';
    erro.textContent = (err && err.message)
      ? ('Erro: ' + err.message)
      : 'Falha de conexão. Tente novamente.';
  });
}

function sair() {
  localStorage.removeItem(TOKEN_KEY);
  sessao = { token: null, nome: null, papel: null };
  mostrarLogin();
}

function mostrarLogin() {
  document.getElementById('splash').classList.add('oculto');
  document.getElementById('app').classList.add('oculto');
  document.getElementById('tela-login').classList.remove('oculto');
}

/* --------------------------- app shell --------------------------- */
var ROTULO_PAPEL = {
  master: 'Master', tingimento: 'Tingimento',
  almoxarifado1: 'Almoxarifado 1', almoxarifado2: 'Almoxarifado 2',
  programacao: 'Programação'
};

/** true se o papel da sessão atual está na lista de papéis que podem EDITAR
 * uma tela (não só ver) — usado em telas que várias papéis acessam, mas só
 * alguns podem alterar (ex.: Quantidade Tingida e Confirmar Embarque). O
 * servidor sempre confere de novo (ver `exigirSessao`); isto é só pra não
 * mostrar controles de edição a quem não pode usá-los. */
function podeEditar(papeisComEdicao) {
  return papeisComEdicao.indexOf(sessao.papel) !== -1;
}

/* Menu por papel. O master enxerga tudo; cada operador só o que é dele. */
var MENUS = {
  master: [
    { id: 'analise',    rotulo: 'Análise de Compra',  render: viewAnalise },
    { id: 'tingimento', rotulo: 'Tingimento',          render: viewTingimento },
    { id: 'qtdtingida', rotulo: 'Quantidade Tingida',  render: viewQuantidadeTingida },
    { id: 'embarques',  rotulo: 'Confirmar Embarque',  render: viewConfirmarEmbarque },
    { id: 'assocfiocru',rotulo: 'Associação Fio Crú',  render: viewAssociacaoFioCru },
    { id: 'fiocru',     rotulo: 'Estoque Fio Crú',     render: viewFioCru },
    { id: 'importarnf', rotulo: 'Importar NF (Fio Crú)', render: viewImportarNfFioCru },
    { id: 'consulta',   rotulo: 'Consulta Estoque',    render: viewConsultaEstoque },
    { id: 'importar',   rotulo: 'Importar Embarque',   render: viewImportarEmbarque },
    { id: 'estoqueunidades', rotulo: 'Estoque entre unidades', render: viewEstoqueUnidades },
    { id: 'relatorio',   rotulo: 'Relatório',           render: viewRelatorio },
    { id: 'usuarios',   rotulo: 'Usuários',            render: viewUsuarios }
  ],
  // Tingimento: edita Quantidade Tingida (é a tela feita pra quem tinge
  // lançar quanto foi feito); em Confirmar Embarque só pode VER (a confirmação
  // final é decisão de logística/almoxarifado, não do chão de tingimento).
  tingimento: [
    { id: 'tingimento', rotulo: 'Tingimento',          render: viewTingimento },
    { id: 'qtdtingida', rotulo: 'Quantidade Tingida',  render: viewQuantidadeTingida },
    { id: 'embarques',  rotulo: 'Confirmar Embarque',  render: viewConfirmarEmbarque },
    { id: 'consulta',   rotulo: 'Consulta Estoque',    render: viewConsultaEstoque },
    { id: 'relatorio',   rotulo: 'Relatório',           render: viewRelatorio }
  ],
  // Almoxarifado 1: só VÊ Quantidade Tingida (não lança tingimento); edita
  // Confirmar Embarque, Associação Fio Crú, Estoque Fio Crú e Importar NF —
  // é quem toca o fio crú e a saída de mercadoria no dia a dia.
  almoxarifado1: [
    { id: 'qtdtingida', rotulo: 'Quantidade Tingida',  render: viewQuantidadeTingida },
    { id: 'embarques',  rotulo: 'Confirmar Embarque',  render: viewConfirmarEmbarque },
    { id: 'assocfiocru',rotulo: 'Associação Fio Crú',  render: viewAssociacaoFioCru },
    { id: 'fiocru',     rotulo: 'Estoque Fio Crú',     render: viewFioCru },
    { id: 'importarnf', rotulo: 'Importar NF (Fio Crú)', render: viewImportarNfFioCru },
    { id: 'importar',   rotulo: 'Importar Embarque',   render: viewImportarEmbarque },
    { id: 'consulta',   rotulo: 'Consulta Estoque',    render: viewConsultaEstoque },
    { id: 'estoqueunidades', rotulo: 'Estoque entre unidades', render: viewEstoqueUnidades },
    { id: 'relatorio',   rotulo: 'Relatório',           render: viewRelatorio }
  ],
  almoxarifado2: [
    { id: 'relatorio',   rotulo: 'Relatório',           render: viewRelatorio },
    { id: 'consulta',   rotulo: 'Consulta Estoque',    render: viewConsultaEstoque }
  ],
  // Programação: só VÊ Tingimento, Quantidade Tingida e Relatório (não edita).
  // Exceção: pode marcar prioridade e disparar a urgência na tela de Tingimento.
  programacao: [
    { id: 'tingimento', rotulo: 'Tingimento',          render: viewTingimento },
    { id: 'qtdtingida', rotulo: 'Quantidade Tingida',  render: viewQuantidadeTingida },
    { id: 'embarques',  rotulo: 'Confirmar Embarque',  render: viewConfirmarEmbarque },
    { id: 'consulta',   rotulo: 'Consulta Estoque',    render: viewConsultaEstoque },
    { id: 'relatorio',  rotulo: 'Relatório',           render: viewRelatorio }
  ]
};

/** Navega para um item de menu pelo id (usado após gerar a compra). */
function irParaMenu(id) {
  var itens = MENUS[sessao.papel] || [];
  var botoes = document.querySelectorAll('#menu button');
  for (var i = 0; i < itens.length; i++) {
    if (itens[i].id === id) { selecionar(itens[i], botoes[i]); return; }
  }
}

function abrirApp() {
  document.getElementById('splash').classList.add('oculto');
  document.getElementById('tela-login').classList.add('oculto');
  document.getElementById('app').classList.remove('oculto');
  document.getElementById('lbl-nome').textContent = sessao.nome || '';
  document.getElementById('lbl-papel').textContent = ROTULO_PAPEL[sessao.papel] || sessao.papel;
  renderSeletorUnidade();

  var itens = MENUS[sessao.papel] || [];
  var nav = document.getElementById('menu');
  nav.innerHTML = '';
  itens.forEach(function (item, i) {
    var b = document.createElement('button');
    b.textContent = item.rotulo;
    b.onclick = function () { selecionar(item, b); };
    nav.appendChild(b);
    if (i === 0) selecionar(item, b);
  });
}

/* ------------------------- seletor de unidade ------------------------- */
/* Uma unidade = uma planilha/empresa (Ceará, Bahia...). Trocar não recarrega
 * a página: pega um token novo já com a unidade escolhida e volta pro app. */
function renderSeletorUnidade() {
  var sel = document.getElementById('sel-unidade');
  var unidades = sessao.unidades || [];
  if (unidades.length < 2) { sel.style.display = 'none'; return; }
  sel.style.display = '';
  sel.innerHTML = unidades.map(function (u) {
    return '<option value="' + u.id + '">' + u.rotulo + '</option>';
  }).join('');
  sel.value = sessao.unidade ? sessao.unidade.id : unidades[0].id;
  sel.onchange = function () { trocarUnidadeAtiva(sel.value); };
}

function trocarUnidadeAtiva(unidadeId) {
  var sel = document.getElementById('sel-unidade');
  sel.disabled = true;
  chamar('trocarUnidade', sessao.token, unidadeId).then(function (r) {
    sel.disabled = false;
    if (!r || !r.ok) return;
    sessao.token = r.token;
    sessao.unidade = r.unidade;
    localStorage.setItem(TOKEN_KEY, r.token);
    // Zera os dados carregados da unidade anterior antes de reabrir — cada
    // unidade tem seu próprio estoque/pedidos, não faz sentido misturar.
    estadoAnalise = { dataInicio: null, dataFim: null, kgBase: '20', itens: [], mensagem: '', novosItens: [] };
    estadoTingimento = { linhas: [] };
    pedidoInfo = { numero: null, data: null };
    abrirApp();
  }).catch(function (err) {
    sel.disabled = false;
    alert((err && err.message) ? err.message : 'Não foi possível trocar de unidade.');
    sel.value = sessao.unidade ? sessao.unidade.id : sel.value;
  });
}

function selecionar(item, botao) {
  Array.prototype.forEach.call(
    document.querySelectorAll('#menu button'),
    function (b) { b.classList.remove('ativo'); });
  if (botao) botao.classList.add('ativo');
  var alvo = document.getElementById('conteudo');
  alvo.innerHTML = '';
  item.render(alvo);
}

/* Trata erro de sessão expirada em qualquer chamada de dados. */
function tratarErro(err) {
  var msg = (err && err.message) ? err.message : String(err);
  if (/sess[aã]o expirada/i.test(msg)) { sair(); return null; }
  return msg;
}

/* -------------------------- view: análise ------------------------- */
function ymd(d) {
  var m = ('0' + (d.getMonth() + 1)).slice(-2);
  var dia = ('0' + d.getDate()).slice(-2);
  return d.getFullYear() + '-' + m + '-' + dia;
}

// Estado da análise, preservado enquanto a sessão estiver aberta.
var estadoAnalise = { dataInicio: null, dataFim: null, kgBase: '20', itens: [], mensagem: '', novosItens: [] };

function viewAnalise(alvo) {
  var hoje = new Date();
  var fimPadrao = ymd(hoje);
  var inicioPadrao = ymd(new Date(hoje.getFullYear(), hoje.getMonth() - 3, hoje.getDate()));
  var vi = estadoAnalise.dataInicio || inicioPadrao;
  var vf = estadoAnalise.dataFim || fimPadrao;
  var vk = estadoAnalise.kgBase || '20';
  alvo.innerHTML =
    '<section class="painel">' +
      '<h2>Análise de Estoque para Compra</h2>' +
      '<p class="desc">Escolha o período. O sistema lista o <b>saldo final</b> de ' +
      'todos os itens que tiveram lançamento nesse período e o <b>consumo médio</b> ' +
      '(saídas dos últimos 3 meses ÷ 3). O que já está <b>em viagem</b> (embarcado ' +
      'e ainda não chegado) é somado ao saldo para não pedir compra à toa. Itens com ' +
      'saldo <b>igual ou abaixo</b> do valor base (kg) ficam destacados. <b>Marque</b> ' +

      '<div class="linha-form">' +
        '<div class="campo">' +
          '<label for="data-inicio">Data inicial</label>' +
          '<input type="date" id="data-inicio" value="' + vi + '">' +
        '</div>' +
        '<div class="campo">' +
          '<label for="data-fim">Data final</label>' +
          '<input type="date" id="data-fim" value="' + vf + '">' +
        '</div>' +
        '<div class="campo">' +
          '<label for="kg-base">Destacar saldo ≤ (kg)</label>' +
          '<input type="number" id="kg-base" value="' + vk + '" step="any" style="max-width:130px">' +
        '</div>' +
        '<button class="btn-principal" id="btn-analisar">Analisar estoque</button>' +
      '</div>' +
      '<div id="analise-msg"></div>' +
    '</section>' +
    '<section class="painel" id="painel-pendencias" style="display:none">' +
      '<h2>Pendências de embarque</h2>' +
      '<p class="desc">Embarques com item(ns) já lançado(s) no estoque, mas outro(s) do ' +
      'mesmo nº ainda não — pode ser esquecimento na entrada do estoque ou erro de digitação. ' +
      'Some ao lançar o item no estoque para sair sozinho desta lista.</p>' +
      '<div class="tabela-wrap" id="tabela-pendencias"></div>' +
    '</section>' +
    '<section class="painel" id="painel-novos-associacao" style="display:none">' +
      '<h2>Itens novos cadastrados na Associação</h2>' +
      '<p class="desc">Código que apareceu pela primeira vez na produção — o sistema já ' +
      'cadastrou um nome padrão sozinho (um palpite). Confira; se algum estiver errado, ' +
      'corrija o texto e clique em Salvar — a correção vale para sempre, não precisa repetir.</p>' +
      '<div class="tabela-wrap" id="tabela-novos-associacao"></div>' +
    '</section>' +
    '<section class="painel" id="painel-lista" style="display:none">' +
      '<h2>Itens do período</h2>' +
      '<p class="desc">Marque a caixa <b>Comprar</b> nos itens que devem ' +
      'entrar na compra. Use o botão ↻ ao lado da <b>data limite de embarque</b> ' +
      'para reconsultar só aquele item, caso a data tenha sido alterada na ' +
      'outra planilha depois que esta lista foi carregada. Encontrou um ' +
      'estoque avulso, fora de qualquer controle? Digite em <b>Estoque encontrado</b> — ' +
      'ele soma ao saldo e recalcula a necessidade de compra (máquinas/total) na hora.</p>' +
      '<p class="legenda-abastecido">Linhas em amarelo: fio com estoque maior que o consumo ' +
      'médio — agrupado no fim da lista de fios, sem urgência de compra por ora.</p>' +
      '<div id="lista-msg"></div>' +
      '<div class="tabela-wrap" id="tabela-lista"></div>' +
      '<div style="margin-top:16px">' +
        '<button class="btn-principal" id="btn-prosseguir" style="display:none">' +
        'Prosseguir com a compra</button>' +
      '</div>' +
      '<div id="prosseguir-msg"></div>' +
    '</section>' +
    '<section class="painel" id="painel-relacao" style="display:none">' +
      '<h2>Relação de compra (histórico acumulado)</h2>' +
      '<p class="desc">Cada compra gerada se <b>acrescenta</b> aqui — o tingimento nem sempre ' +
      'consegue fazer tudo de uma vez, então os pedidos vão se acumulando até serem ' +
      'processados. Use "Excluir relatório" só quando quiser mesmo apagar tudo e recomeçar do zero.</p>' +
      '<div class="tabela-wrap" id="tabela-relacao"></div>' +
      '<div style="margin-top:16px">' +
        '<button class="btn-sair" id="btn-excluir-relacao" style="color:var(--erro);border-color:#F2C6C3">' +
        'Excluir relatório e começar do zero</button>' +
      '</div>' +
      '<div id="excluir-relacao-msg"></div>' +
    '</section>';

  document.getElementById('btn-analisar').onclick = analisarEstoque;
  document.getElementById('btn-prosseguir').onclick = prosseguirCompra;
  document.getElementById('btn-excluir-relacao').onclick = excluirRelacao;
  document.getElementById('kg-base').addEventListener('input', function () {
    estadoAnalise.kgBase = document.getElementById('kg-base').value;
    reaplicarDestaque();
  });

  // 1ª vez na sessão (ainda sem data escolhida): pré-preenche "data inicial"
  // com a data final do último pedido efetivamente enviado, pra continuar
  // de onde parou. Só troca o campo se o usuário não tiver mexido nele.
  if (!estadoAnalise.dataInicio) {
    chamar('obterUltimaDataFimCompra', sessao.token).then(function (r) {
      var campo = document.getElementById('data-inicio');
      if (r && r.data && campo && !estadoAnalise.dataInicio) {
        campo.value = r.data;
        estadoAnalise.dataInicio = r.data;
      }
    }).catch(function () {});
  }

  // Restaura a lista já analisada na sessão e recarrega a última relação salva.
  if (estadoAnalise.itens.length) {
    document.getElementById('analise-msg').innerHTML =
      '<div class="aviso ok">' + (estadoAnalise.mensagem || '') + '</div>';
    renderLista(estadoAnalise.itens);
  }
  renderNovosAssociacao(estadoAnalise.novosItens);
  carregarUltimaRelacao();
  carregarPendencias();
}

/** Carrega a aba de pendências de embarque a qualquer momento (sem precisar rodar a análise). */
function carregarPendencias() {
  chamar('listarPendenciasEmbarque', sessao.token)
    .then(function (r) { renderPendencias(r.linhas); })
    .catch(function () { /* silencioso — só não mostra o painel */ });
}

function renderPendencias(linhas) {
  var painel = document.getElementById('painel-pendencias');
  var wrap = document.getElementById('tabela-pendencias');
  if (!painel || !wrap) return;
  if (!linhas || !linhas.length) { painel.style.display = 'none'; return; }
  painel.style.display = '';
  var body = linhas.map(function (l) {
    return '<tr class="destaque">' +
      '<td>' + (l.item || '—') + '</td>' +
      '<td>' + (l.embarque || '—') + '</td>' +
      '<td style="text-align:right">' + num(l.quantidade) + '</td>' +
      '<td>' + (l.dataEmbarque || '—') + '</td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' +
      '<th style="width:20%">Item</th><th style="width:15%">Embarque</th>' +
      '<th style="text-align:right;width:15%">Quantidade</th><th style="width:20%">Data do embarque</th>' +
    '</tr></thead><tbody>' + body + '</tbody></table>';
}

/**
 * Itens que acabaram de ser cadastrados sozinhos na ASSOCIAÇÃO (nome
 * "palpitado" por _transformarFio). Mostra o código + nome num campo
 * editável; o master confere e, se precisar, corrige e salva — a correção
 * fica valendo para sempre (grava direto na aba ASSOCIAÇÃO).
 */
function renderNovosAssociacao(itens) {
  var painel = document.getElementById('painel-novos-associacao');
  var wrap = document.getElementById('tabela-novos-associacao');
  if (!painel || !wrap) return;
  if (!itens || !itens.length) { painel.style.display = 'none'; return; }
  painel.style.display = '';
  var body = itens.map(function (it, i) {
    var extras = (it.extras && it.extras.length)
      ? '<br><small style="color:var(--texto-fraco)">código composto — também gerou: ' +
        it.extras.map(escAttr).join(', ') + ' (não editável aqui)</small>'
      : '';
    return '<tr>' +
      '<td>' + escAttr(it.codigo) + '</td>' +
      '<td><input type="text" class="in-nome-associacao" value="' + escAttr(it.nome) + '" style="width:100%">' + extras + '</td>' +
      '<td><button class="btn-principal btn-salvar-associacao" type="button" data-codigo="' + escAttr(it.codigo) + '" data-idx="' + i + '">Salvar</button></td>' +
      '<td><span id="msg-associacao-' + i + '" style="font-size:13px"></span></td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' +
      '<th style="width:18%">Código</th><th>Nome cadastrado</th><th style="width:10%"></th><th style="width:22%"></th>' +
    '</tr></thead><tbody>' + body + '</tbody></table>';
  Array.prototype.forEach.call(wrap.querySelectorAll('.btn-salvar-associacao'), function (btn) {
    btn.onclick = function () { salvarCorrecaoAssociacao(btn); };
  });
}

function salvarCorrecaoAssociacao(btn) {
  var tr = btn.parentNode.parentNode; // <td><button></td></tr>
  var input = tr.querySelector('.in-nome-associacao');
  var codigo = btn.getAttribute('data-codigo');
  var idx = btn.getAttribute('data-idx');
  var nome = input.value.trim();
  var msgEl = document.getElementById('msg-associacao-' + idx);
  if (!nome) { msgEl.innerHTML = '<span style="color:var(--erro)">Informe o nome.</span>'; return; }

  btn.disabled = true;
  chamar('corrigirAssociacao', sessao.token, codigo, nome)
    .then(function () {
      // mantém em sincronia caso o mesmo código apareça na lista principal
      (estadoAnalise.itens || []).forEach(function (it) {
        if (it.item === codigo) it.descricao = nome;
      });
      // confirmado: some da lista de conferência (já cumpriu o papel dela)
      estadoAnalise.novosItens = (estadoAnalise.novosItens || []).filter(function (it) {
        return it.codigo !== codigo;
      });
      renderNovosAssociacao(estadoAnalise.novosItens);
    })
    .catch(function (err) {
      btn.disabled = false;
      var m = tratarErro(err);
      msgEl.innerHTML = '<span style="color:var(--erro)">' + (m || 'Erro ao salvar.') + '</span>';
    });
}

/** Modal simples de confirmação (evita depender de confirm()/alert() nativos, que o
 * sandbox do HtmlService pode bloquear). callback(true) se clicar no botão em
 * destaque (rotuloDestaque), callback(false) se clicar no outro (rotuloSecundario). */
function confirmarModal(titulo, texto, rotuloDestaque, rotuloSecundario, callback) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,33,.45);' +
    'display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';
  overlay.innerHTML =

function num(v) {
  if (v === '' || v === null || v === undefined) return '—';
  var n = Number(v);
  return isNaN(n) ? v : n.toLocaleString('pt-BR');
}

/** Formata um número como moeda em Reais (ex.: 1234.5 → "R$ 1.234,50"). */
function moeda(v) {
  var n = Number(v) || 0;
  return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

/** Converte texto digitado (com vírgula ou ponto) em número; vazio/ inválido → 0. */
function parseNumeroBR(v) {
  var n = parseFloat(String(v == null ? '' : v).replace(',', '.'));
  return isNaN(n) ? 0 : n;
}

/** Prioridade de compra de um item (mesmo critério do servidor — ver
 * `_rankPrioridadeCompra` em Analise.gs): 0 = fio que precisa de atenção,
 * 1 = fio já bem abastecido (saldo > consumo médio, agrupado no fim dos
 * fios), 2 = não é fio (sempre por último). */
function _rankPrioridadeCompra(it) {
  if (!it.tipoFio) return 2;
  var saldoEfetivo = Number(it.saldo) + Number(it.emViagem || 0) +
    Number(it.estoqueEncontrado || 0) + Number(it.emAberto || 0);
  return saldoEfetivo > Number(it.consumoMedio) ? 1 : 0;
}

/** Ordena a lista pela mesma regra do servidor (fio que precisa de atenção
 * primeiro, do saldo mais crítico pro menos; fio bem abastecido no fim dos
 * fios; não-fio por último) — considerando o saldo JÁ ajustado pelo estoque
 * encontrado, pra reordenar sozinho quando o usuário digita um valor. */
function ordenarItensAnalise() {
  estadoAnalise.itens.sort(function (a, b) {
    var ra = _rankPrioridadeCompra(a), rb = _rankPrioridadeCompra(b);
    if (ra !== rb) return ra - rb;
    var sa = Number(a.saldo) + Number(a.emViagem || 0) + Number(a.estoqueEncontrado || 0) + Number(a.emAberto || 0);
    var sb = Number(b.saldo) + Number(b.emViagem || 0) + Number(b.estoqueEncontrado || 0) + Number(b.emAberto || 0);
    return sa - sb;
  });
}

/** Soma o "estoque encontrado" ao saldo + em viagem e reconsulta o pedido de
 * tingimento daquele item, para recalcular a necessidade de compra na hora. */
function atualizarEstoqueEncontradoLinha(idx, inp) {
  var it = estadoAnalise.itens[idx];
  if (!it) return;
  var msg = document.getElementById('lista-msg');
  it.estoqueEncontrado = inp.value === '' ? 0 : Number(inp.value) || 0;

  inp.disabled = true;
  chamar('recalcularTingimentoItem', sessao.token, {
    item: it.item, saldo: it.saldo, emViagem: it.emViagem,
    estoqueEncontrado: it.estoqueEncontrado, emAberto: it.emAberto, consumoMedio: it.consumoMedio
  })
    .then(function (r) {
      it.tipoFio = r.tipoFio || '';
      it.maquinas = r.maquinas || '';
      it.totalTingimento = r.totalTingimento || 0;
      // recria a tabela já na nova ordem (o campo já tinha perdido o foco,
      // já que "change" só dispara ao sair do campo — não atrapalha digitação)
      ordenarItensAnalise();
      renderLista(estadoAnalise.itens);
      if (msg) msg.innerHTML = '';
    })
    .catch(function (err) {
      inp.disabled = false;
      var m = tratarErro(err);
      if (m && msg) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

/** Reconsulta, na hora, a data limite de embarque de UM item (vem de outra
 * planilha e pode ter mudado enquanto esta lista já estava na tela). */
function atualizarDataLimiteLinha(idx, btn) {
  var it = estadoAnalise.itens[idx];
  if (!it || !it.item) return;
  var msg = document.getElementById('lista-msg');
  btn.disabled = true;
  btn.textContent = '…';
  chamar('consultarDataLimiteItem', sessao.token, it.item)
    .then(function (r) {
      btn.disabled = false;
      btn.textContent = '↻';
      it.dataLimite = r.dataLimite || '';
      var inp = document.querySelector('.data-input[data-idx="' + idx + '"]');
      if (inp) inp.value = brParaISO(it.dataLimite);
      if (msg) msg.innerHTML = '';
    })
    .catch(function (err) {
      btn.disabled = false;
      btn.textContent = '↻';
      var m = tratarErro(err);
      if (m && msg) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

/** Realça as linhas cujo saldo final é ≤ ao valor base (kg), sem recriar a tabela. */
function reaplicarDestaque() {
  var campo = document.getElementById('kg-base');
  var base = campo ? parseFloat(campo.value) : NaN;
  var linhas = document.querySelectorAll('#tabela-lista tbody tr');
  Array.prototype.forEach.call(linhas, function (tr) {
    var it = estadoAnalise.itens[Number(tr.getAttribute('data-idx'))];
    var saldo = it
      ? Number(it.saldo) + Number(it.emViagem || 0) + Number(it.estoqueEncontrado || 0) + Number(it.emAberto || 0)
      : NaN;
    tr.classList.toggle('destaque', !isNaN(base) && !isNaN(saldo) && saldo <= base);
    // amarelo: fio já com mais estoque do que consome em média — sem
    // urgência de compra por ora (mesmo critério que agrupa esses itens
    // no fim da lista de fios — ver ordenarItensAnalise/_rankPrioridadeCompra).
    tr.classList.toggle('destaque-abastecido',
      !!it && !!it.tipoFio && !isNaN(saldo) && saldo > Number(it.consumoMedio));
  });
}

function carregarUltimaRelacao() {
  chamar('obterRelacaoDeCompra', sessao.token)
    .then(function (r) { renderRelacaoSalva(r.linhas); })
    .catch(function () { /* silencioso — só não mostra o painel */ });

function renderRelacaoSalva(linhas) {
  var painel = document.getElementById('painel-relacao');
  var wrap = document.getElementById('tabela-relacao');
  if (!painel || !wrap) return;
  if (!linhas || !linhas.length) { painel.style.display = 'none'; return; }
  painel.style.display = '';
  var cols = ['ITEM', 'DESCRICAO', 'CLIENTE', 'TIPO_FIO', 'SALDO', 'EM_VIAGEM', 'ESTOQUE_ENCONTRADO',
              'CONSUMO_MEDIO', 'MAQUINAS', 'SUGERIDO', 'DATA_LIMITE', 'OBS', 'STATUS', 'GERADO_EM'];
  var rot = {
    ITEM: 'Item', DESCRICAO: 'Descrição', CLIENTE: 'Cliente', TIPO_FIO: 'Tipo de fio',
    SALDO: 'Saldo final', EM_VIAGEM: 'Em viagem', ESTOQUE_ENCONTRADO: 'Estoque encontrado',
    CONSUMO_MEDIO: 'Consumo médio', MAQUINAS: 'Máquinas',
    SUGERIDO: 'Total (kg)', DATA_LIMITE: 'Data limite embarque', OBS: 'Observação',
    STATUS: 'Status', GERADO_EM: 'Gerado em'
  };
  var numericas = { SALDO: 1, EM_VIAGEM: 1, ESTOQUE_ENCONTRADO: 1, CONSUMO_MEDIO: 1, SUGERIDO: 1 };
  var th = cols.map(function (c) { return '<th>' + rot[c] + '</th>'; }).join('');
  var body = linhas.map(function (l) {
    return '<tr>' + cols.map(function (c) {
      if (numericas[c]) return '<td>' + num(l[c]) + '</td>';
      var v = l[c];
      if (c === 'DATA_LIMITE') v = soDataBR(v);
      else if (c === 'GERADO_EM') v = soDataHoraBR(v);
      return '<td>' + (v !== '' && v != null ? v : '—') + '</td>';
    }).join('') + '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' + th + '</tr></thead><tbody>' + body + '</tbody></table>';
}

/** aaaa-MM-ddTHH:mm... (ISO) → dd/MM/aaaa HH:mm; devolve o valor original se não reconhecer. */
function soDataHoraBR(v) {
  var s = String(v == null ? '' : v);
  if (!s) return '';
  var d = new Date(s);
  if (isNaN(d.getTime())) return s;
  var dd = String(d.getDate()).padStart(2, '0');
  var mm = String(d.getMonth() + 1).padStart(2, '0');
  var hh = String(d.getHours()).padStart(2, '0');
  var mi = String(d.getMinutes()).padStart(2, '0');
  return dd + '/' + mm + '/' + d.getFullYear() + ' ' + hh + ':' + mi;
}

 * depois disso, editar o campo não some com o valor até clicar em ↻ de novo

function escAttr(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
    .replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderTingimento(linhas) {
  var wrap = document.getElementById('tabela-ting');
  var legenda = document.getElementById('legenda-critico');
  if (!linhas || !linhas.length) {
    wrap.innerHTML = '<div class="vazio">Nenhum item para tingir. Gere uma relação na Análise de Compra.</div>';
    if (legenda) legenda.style.display = 'none';
    return;
  }
  var temCritico = linhas.some(function (l) { return l.saldoCritico; });
  if (legenda) legenda.style.display = temCritico ? '' : 'none';
  var editavelTing = podeEditar(['master', 'tingimento']);
  var priorizar = podeEditar(['master', 'programacao']);

  var body = linhas.map(function (l) {
    var dataCel = editavelTing
      ? '<input type="date" class="data-input" data-linha="' + l.linha + '" value="' + brParaISO(l.dataLimite) + '">'
      : (l.dataLimite || '—');
    var obsCel = editavelTing
      ? '<input class="obs-input" data-linha="' + l.linha + '" value="' + escAttr(l.obs) + '" placeholder="anotação…">'
      : (l.obs ? escAttr(l.obs) : '—');
    var prioridadeCel = '';
    if (priorizar) {
      var temUrg = String(l.obs || '').toUpperCase().indexOf('URGENTE') !== -1;
      prioridadeCel = '<td class="no-print" style="text-align:center;white-space:nowrap">' +
        '<input type="checkbox" class="chk-prioridade" data-linha="' + l.linha + '"' + (l.prioridade ? ' checked' : '') + '>' +
        (l.prioridade && (l.dataUrgencia || l.qtdUrgencia)
          ? '<div style="font-size:11px;color:#B91C1C">' +
              (l.qtdUrgencia ? l.qtdUrgencia + ' kg' : '') +
              (l.qtdUrgencia && l.dataUrgencia ? ' · ' : '') +
              (l.dataUrgencia ? 'p/ ' + escAttr(l.dataUrgencia) : '') +
            '</div>'
          : '') +
        (temUrg
          ? '<div><button type="button" class="btn-atualizar-data btn-limpar-urg" data-linha="' + l.linha +
            '" title="Tirar o URGENTE da observação deste item">limpar urgência</button></div>'
          : '') +
      '</td>';
    }
    return '<tr' + (l.saldoCritico ? ' class="destaque"' : '') + (l.prioridade ? ' style="box-shadow:inset 4px 0 0 0 #B91C1C"' : '') + '>' +
      '<td>' + (l.dataSolicitado ? l.dataSolicitado : '—') + '</td>' +
      '<td>' + (l.item || '—') + '</td>' +
      '<td>' + (l.descricao ? l.descricao : '—') + '</td>' +
      '<td>' + (l.cliente ? l.cliente : '—') + '</td>' +
      '<td>' + (l.maquinas ? l.maquinas : '—') + '</td>' +
      '<td style="text-align:right">' + (l.total !== '' && l.total != null ? l.total : '—') + '</td>' +
      '<td>' + dataCel + '</td>' +
      '<td>' + obsCel + '</td>' +
      (editavelTing
        ? '<td class="no-print" style="text-align:center">' +
            '<button type="button" class="btn-remover-linha" data-linha="' + l.linha + '" ' +
              'title="Remover este item da lista pendente (sem receber embarque — resíduo que não vale mais esperar)">✕</button>' +
          '</td>'
        : '') +
      prioridadeCel +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' +
      '<th style="width:8%">Solicitado em</th>' +
      '<th style="width:10%">Item</th><th style="width:24%">Descrição</th>' +
      '<th style="width:13%">Cliente</th><th style="width:11%">Máquinas</th>' +
      '<th style="text-align:right;width:7%">Total (kg)</th>' +
      '<th style="width:13%">Data limite embarque</th><th style="width:14%">Observação</th>' +
      (editavelTing ? '<th class="no-print" style="width:4%"></th>' : '') +
      (priorizar ? '<th class="no-print" style="width:6%">Prioridade</th>' : '') +
    '</tr></thead><tbody>' + body + '</tbody></table>';

  if (editavelTing) {
    Array.prototype.forEach.call(wrap.querySelectorAll('.obs-input'), function (inp) {
      inp.addEventListener('change', function () { salvarCampoTing(inp, 'OBS', inp.value); });
    });
    Array.prototype.forEach.call(wrap.querySelectorAll('.data-input'), function (inp) {
      inp.addEventListener('change', function () {
        var linha = Number(inp.getAttribute('data-linha'));
        var novaData = isoParaBR(inp.value);
        salvarCampoTing(inp, 'DATA_LIMITE', novaData, function () {
          var alvo = null;
          estadoTingimento.linhas.forEach(function (l) { if (l.linha === linha) alvo = l; });
          if (alvo) alvo.dataLimite = novaData;
          estadoTingimento.linhas = ordenarTingimentoPorDataLimite(estadoTingimento.linhas);
          renderTingimento(estadoTingimento.linhas);
        });
      });
    });
    Array.prototype.forEach.call(wrap.querySelectorAll('.btn-remover-linha'), function (btn) {
      btn.addEventListener('click', function () { removerLinhaTingimento(btn); });
    });
  }
  if (priorizar) {
    Array.prototype.forEach.call(wrap.querySelectorAll('.chk-prioridade'), function (chk) {
      chk.addEventListener('change', function () {
        var linha = Number(chk.getAttribute('data-linha'));
        var alvo = null;
        estadoTingimento.linhas.forEach(function (l) { if (l.linha === linha) alvo = l; });
        if (!alvo) return;
        if (chk.checked) {
          abrirModalDataUrgencia(alvo.item, function (confirmado, dataBR, qtdKg) {
            if (!confirmado) { alvo.prioridade = false; alvo.dataUrgencia = ''; alvo.qtdUrgencia = ''; }
            else { alvo.prioridade = true; alvo.dataUrgencia = dataBR || ''; alvo.qtdUrgencia = qtdKg || ''; }
            renderTingimento(estadoTingimento.linhas);
          });
        } else {
          alvo.prioridade = false; alvo.dataUrgencia = ''; alvo.qtdUrgencia = '';
          renderTingimento(estadoTingimento.linhas);
        }
      });
    });
    Array.prototype.forEach.call(wrap.querySelectorAll('.btn-limpar-urg'), function (btn) {
      btn.addEventListener('click', function () { limparUrgenciaItem(Number(btn.getAttribute('data-linha'))); });
    });
  }
}

      '<h3 style="margin:0 0 8px;color:#B91C1C;font-size:17px">Marcar como urgente</h3>' +
      '<p style="margin:0 0 14px;color:#475569;font-size:14px;line-height:1.5">Item <b>' + escAttr(item) + '</b>. ' +
        'Informe (opcional) a <b>quantidade prioritária</b> e a <b>data</b> — nada disso muda o pedido nem a ' +
        'data limite originais; é só pra sinalizar e registrar.</p>' +
      '<label style="display:block;font-size:13px;font-weight:600;margin-bottom:4px">Quantidade prioritária (kg)</label>' +
      '<select id="modal-urg-qtd" style="width:100%;box-sizing:border-box;padding:9px 11px;' +
        'border:1px solid #cbd5e1;border-radius:8px;font-size:14px">' +
        '<option value="">— selecione um lote —</option>' +
      '</select>' +
      '<div id="modal-urg-hint" style="font-size:12px;color:#64748b;margin:5px 0 14px">Carregando lotes de tingimento…</div>' +
      '<label style="display:block;font-size:13px;font-weight:600;margin-bottom:4px">Data da urgência</label>' +
      '<input type="date" id="modal-urg-data" style="width:100%;box-sizing:border-box;padding:9px 11px;' +
        'border:1px solid #cbd5e1;border-radius:8px;font-size:14px;margin-bottom:16px">' +
      '<div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap">' +
        '<button id="modal-btn-secundario" style="padding:10px 16px;border:1px solid #D8E0E8;border-radius:8px;background:#fff;cursor:pointer;font-size:14px">Cancelar</button>' +
        '<button id="modal-btn-destaque" style="padding:10px 18px;border:none;border-radius:8px;background:#B91C1C;color:#fff;cursor:pointer;font-size:14px;font-weight:600">Marcar urgente</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  function fechar() { if (overlay.parentNode) document.body.removeChild(overlay); }
  // Busca os lotes de tingimento do tipo de fio do item pra sugerir no campo.
  chamar('obterLotesTingimentoItem', sessao.token, item)
    .then(function (r) {
      var sel = overlay.querySelector('#modal-urg-qtd');
      var hint = overlay.querySelector('#modal-urg-hint');
      if (r && r.lotes && r.lotes.length) {
        sel.innerHTML = '<option value="">— selecione um lote —</option>' +
          r.lotes.map(function (q) { return '<option value="' + q + '">' + q + ' kg</option>'; }).join('');
        hint.innerHTML = (r.tipoFio ? '<b>' + escAttr(r.tipoFio) + '</b> — ' : '') +
          'escolha um dos lotes de tingimento (ou deixe em branco).';
      } else {
        sel.innerHTML = '<option value="">(sem lote cadastrado)</option>';
        hint.textContent = 'Sem lotes de tingimento cadastrados pra este tipo — a urgência vai sem quantidade.';

      if (hint) hint.textContent = 'Não consegui carregar os lotes.';

    var dataBR = isoParaBR(overlay.querySelector('#modal-urg-data').value);
    var qtd = Number(overlay.querySelector('#modal-urg-qtd').value) || 0;
    fechar(); callback(true, dataBR, qtd > 0 ? qtd : '');
  };
  overlay.querySelector('#modal-btn-secundario').onclick = function () { fechar(); callback(false, '', ''); };
  overlay.querySelector('#modal-urg-data').focus();
}

/** Remove uma linha da lista pendente (PENDENCIA_COMPRA), com confirmação —
 * ação sem volta, diferente de um simples ajuste de campo. */
function removerLinhaTingimento(btn) {
  var linha = Number(btn.getAttribute('data-linha'));
  if (!linha) return;
  if (!window.confirm('Remover este item da lista pendente? Ele não foi baixado por embarque — ' +
    'essa ação só tira da lista, não pode ser desfeita.')) return;
  btn.disabled = true;
  chamar('removerItemPendente', sessao.token, linha)
    .then(function () {
      estadoTingimento.linhas = estadoTingimento.linhas.filter(function (l) { return l.linha !== linha; });
      renderTingimento(estadoTingimento.linhas);
    })
    .catch(function (err) {
      btn.disabled = false;
      tratarErro(err);
    });
}

/* --------------------------- régua de navegação --------------------- */
/**
 * Navegação por ↑/↓ numa tabela: destaca a linha atual como uma "régua",
 * pra ajudar a acompanhar item por item numa lista longa. Clicar numa linha
 * também move a régua pra ela (sem roubar o foco de quem clicou num campo/
 * checkbox — só rouba o foco ao clicar em texto "neutro" da linha, pra
 * poder já usar as setas a partir daí). As setas nunca disputam com quem
 * está digitando/usando o spinner de um campo numérico.
 * Chame UMA vez por tela (ex.: ao montar a view); sobrevive a re-renders da
 * tabela porque o estado fica guardado no próprio elemento do wrap.
 */
function ativarRegua(wrapId) {
  var wrap = document.getElementById(wrapId);
  if (!wrap) return;
  wrap.setAttribute('tabindex', '0');
  wrap._reguaIndice = -1;

  wrap.addEventListener('keydown', function (e) {
    if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
    var editando = e.target && /^(INPUT|SELECT|TEXTAREA)$/.test(e.target.tagName);
    if (editando) return; // não disputa a seta com quem está digitando
    var trs = wrap.querySelectorAll('tbody tr');
    if (!trs.length) return;
    e.preventDefault();
    wrap._reguaIndice = e.key === 'ArrowDown'
      ? Math.min(wrap._reguaIndice + 1, trs.length - 1)
      : Math.max(wrap._reguaIndice - 1, 0);
    aplicarRegua(wrap);
  });

  wrap.addEventListener('click', function (e) {
    var tr = e.target.closest && e.target.closest('tbody tr');
    if (!tr) return;
    var trs = Array.prototype.slice.call(wrap.querySelectorAll('tbody tr'));
    var i = trs.indexOf(tr);
    if (i === -1) return;
    wrap._reguaIndice = i;
    aplicarRegua(wrap);
    var interativo = /^(INPUT|SELECT|TEXTAREA|BUTTON)$/.test(e.target.tagName);
    if (!interativo) wrap.focus(); // só rouba o foco se não clicou num campo/checkbox/botão
  });
}

/** Reaplica o destaque da régua na linha certa — chame depois de recriar a
 * tabela (ex.: após confirmar um item), pra régua não desaparecer sozinha. */
function aplicarRegua(wrap) {
  if (typeof wrap === 'string') wrap = document.getElementById(wrap);
  if (!wrap) return;
  var trs = wrap.querySelectorAll('tbody tr');
  Array.prototype.forEach.call(trs, function (tr) { tr.classList.remove('regua-atual'); });
  var i = wrap._reguaIndice;
  if (i == null || i < 0 || i >= trs.length) return;
  trs[i].classList.add('regua-atual');
  trs[i].scrollIntoView({ block: 'nearest' });
}

function cancelarEmbarquePorNumero() {
  var msg = document.getElementById('cancel-emb-msg');
  var numero = (document.getElementById('cancel-emb-num').value || '').trim();
  var avisar = document.getElementById('cancel-emb-email').checked;
  if (!numero) { msg.innerHTML = '<div class="aviso erro">Informe o número do embarque.</div>'; return; }
  confirmarModal(
    'Cancelar embarque nº ' + numero + '?',
    'Isso vai <b>estornar o consumo de fio crú</b> desse embarque, <b>devolver os itens à lista pendente</b> ' +
    'e marcar o embarque como CANCELADO.' + (avisar ? ' Um e-mail de cancelamento será enviado aos contatos.' : '') +
    ' O e-mail de confirmação original não pode ser desfeito.',
    'Cancelar embarque', 'Voltar',
    function (ok) {
      if (!ok) return;
      var btn = document.getElementById('btn-cancelar-embarque');
      btn.disabled = true;
      msg.innerHTML = '<div class="aviso"><span class="carregando">Cancelando…</span></div>';
      chamar('cancelarEmbarque', sessao.token, numero, avisar)
        .then(function (r) {
          btn.disabled = false;
          var extra = r.semInstantaneo
            ? ' (embarque antigo, sem instantâneo de estorno — confira o fio crú manualmente)'
            : '';
          msg.innerHTML = '<div class="aviso ok">Embarque nº ' + r.numero + ' cancelado: ' + r.itens +
            ' item(ns) devolvido(s) à pendência, ' + r.creditosCru + ' crédito(s) no fio crú' +
            (r.destinatarios ? ', e-mail para ' + r.destinatarios + ' destinatário(s)' : '') + '.' + extra + '</div>';

function carregarListaConfirmarEmbarque() {
  var msg = document.getElementById('embarque-msg');
  msg.innerHTML = '<div class="aviso"><span class="carregando">Carregando…</span></div>';
  chamar('obterListaFioParaTingir', sessao.token)
    .then(function (r) {
      msg.innerHTML = '';
      estadoConfirmarEmbarque.linhas = (r.linhas || []).map(function (l) {
        var o = {
          linha: l.linha, item: l.item, descricao: l.descricao, cliente: l.cliente,
          tipoFio: l.tipoFio, total: Number(l.total) || 0, tingido: l.tingido || 0,
          dataSolicitado: l.dataSolicitado || '',
          quantidade: l.tingido ? String(l.tingido) : '', selecionado: false,
          doEstoque: false, obs: ''
        };
        // "Completo" já vem marcado quando o tingido bateu o alvo — o usuário
        // só digita observação nos casos parciais (pode desmarcar se quiser).
        o.completo = statusTingidoEmbarque(o) === 'completo';
        return o;
      });
      renderConfirmarEmbarque();
    })
    .catch(function (err) {
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

/** 'completo' (tingido cobriu o alvo), 'parcial' (já tem algo tingido, mas
 * não bateu o alvo, ou não há alvo calculado) ou 'nenhum'. */
function statusTingidoEmbarque(l) {
  var total = Number(l.total) || 0;
  var tingido = Number(l.tingido) || 0;
  if (tingido <= 0) return 'nenhum';
  if (total > 0 && tingido >= total) return 'completo';
  return 'parcial';
}

  var wrap = document.getElementById('tabela-embarque-confirmar');
  var btn = document.getElementById('btn-confirmar-embarque');

  // master e almoxarifado1 editam. Ver `podeEditar`.
  var editavel = podeEditar(['master', 'almoxarifado1']);

    wrap.innerHTML = '<div class="vazio">Nenhum item pendente para embarque.</div>';
    btn.style.display = 'none';
    return;
  }
  var body = linhas.map(function (l, i) {
    var editado = String(l.quantidade || '') !== String(l.tingido || '');
    var status = statusTingidoEmbarque(l);

      (status === 'completo' ? 'destaque-tingido-completo' : (status === 'parcial' ? 'destaque-tingido-parcial' : ''));
    var badges = [];

          '"' + (l.selecionado ? ' checked' : '') + '></td>'
        : '') +

      '<td class="col-item">' + (l.item || '—') + '</td>' +
      '<td>' + (l.descricao ? l.descricao : '—') + '</td>' +
      '<td>' + (l.cliente ? l.cliente : '—') + '</td>' +
      '<td>' + (l.tipoFio ? l.tipoFio : '—') + '</td>' +
      '<td style="text-align:right">' + (l.total ? num(l.total) : '—') + '</td>' +
      '<td style="text-align:right">' + num(l.tingido) + ' kg</td>' +
      '<td>' + (editavel
        ? '<input type="number" class="qtd-embarcar-input" data-idx="' + i + '" min="0" step="any" value="' +
          escAttr(l.quantidade) + '">'
        : num(l.quantidade) + ' kg') + '</td>' +
      '<td>' + (badges.length ? badges.join(' ') : '—') + '</td>' +
      (editavel
        ? '<td>' +
            '<label style="white-space:nowrap;font-size:11.5px;cursor:pointer">' +
              '<input type="checkbox" class="chk-obs-completo" data-idx="' + i + '"' +
              (l.completo ? ' checked' : '') + '> completo</label>' +
            (l.completo

                'border:1px solid #cbd5e1;border-radius:5px;font-size:12px">') +
          '</td>' +
          '<td style="text-align:center"><input type="checkbox" class="chk-grande chk-do-estoque" data-idx="' + i +
          '" title="A parte confirmada acima do já tingido sai do estoque pronto, sem consumir fio crú"' +

        : '') +

  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' +
      (editavel ? '<th style="width:4%">Embarcar</th>' : '') + '<th style="width:6%">Solicitado em</th>' +

      '<th style="text-align:right;width:7%">Já tingido</th><th style="width:10%">Quantidade a confirmar</th>' +
      '<th style="width:' + (editavel
        ? '11%">Situação</th><th style="width:16%">Observação (e-mail)</th><th style="width:5%">Do estoque'
        : '24%">Situação') + '</th>' +

function confirmarEmbarqueSelecionado() {

  var campoCusto = document.getElementById('custo-mao-obra');
  var custoMaoObra = campoCusto ? campoCusto.value : '';
  var taxa = parseNumeroBR(custoMaoObra);
  var linhaMaoObra = taxa > 0
    ? ' Mão de obra: ' + moeda(taxa) + '/kg (total ' + moeda(totalKg * taxa) + ').'
    : ' Sem custo de mão de obra informado (R$ 0,00).';
  var comDoEstoque = selecionados.filter(function (l) { return l.doEstoque; }).length;
  var linhaEstoque = comDoEstoque
    ? ' ' + comDoEstoque + ' item(ns) marcado(s) como "do estoque": a parte acima do já tingido sai do ' +
      'estoque pronto, sem consumir fio crú (e sem mão de obra nessa parte).'
    : '';
  confirmarModal(
    'Confirmar embarque?',
    'Isso vai gravar ' + selecionados.length + ' item(ns) (total ' + num(totalKg) + ' kg) como embarcados, ' +
    'dar baixa na lista pendente de compra e no estoque de fio crú, e enviar o e-mail de confirmação ' +
    '(relatório em PDF anexo).' + linhaEstoque + linhaMaoObra + ' Não pode ser desfeito por aqui.',
    'Confirmar', 'Cancelar',
    function (ok) {
      if (!ok) return;
      var btn = document.getElementById('btn-confirmar-embarque');
      btn.disabled = true;
      msg.innerHTML = '<div class="aviso"><span class="carregando">Confirmando e enviando e-mail…</span></div>';
      var itens = selecionados.map(function (l) {
        return {
          item: l.item, quantidade: Number(l.quantidade), doEstoque: !!l.doEstoque,
          // "Completo" marcado dispensa digitação; senão vai o texto digitado.
          obs: l.completo ? 'COMPLETO' : String(l.obs || '').trim()
        };
      });
      var campoObs = document.getElementById('obs-embarque');
      var observacao = campoObs ? campoObs.value : '';
      chamar('confirmarEmbarqueManual', sessao.token, { itens: itens, custoMaoObra: custoMaoObra, observacao: observacao })
        .then(function (r) {
          btn.disabled = false;
          var resumoTxt = r.resumo.map(function (g) {
            return g.tipoFio + ': ' + num(g.totalTingido) + ' kg' +
              (g.totalEstoque ? ' + ' + num(g.totalEstoque) + ' kg do estoque' : '') +
              (g.maoObra ? ' (' + moeda(g.maoObra) + ')' : '');
          }).join(' · ');
          msg.innerHTML = '<div class="aviso ok">Embarque nº ' + r.numero + ' confirmado (' + r.gravados +
            ' item(ns)) — e-mail com PDF enviado para ' + r.destinatarios + ' destinatário(s). ' + resumoTxt + '</div>';
          carregarListaConfirmarEmbarque();
        })
        .catch(function (err) {
          btn.disabled = false;
          var m = tratarErro(err);
          if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
        });
    }
  );
}

/** Ordena a lista do tingimento pela data limite de embarque, a mais próxima
 * primeiro (mesmo critério do servidor) — usada ao reordenar na tela depois
 * de editar uma data, sem precisar recarregar tudo do zero. */
function ordenarTingimentoPorDataLimite(linhas) {
  function ms(s) {
    var m = String(s == null ? '' : s).match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    return m ? new Date(+m[3], +m[2] - 1, +m[1]).getTime() : null;
  }
  return linhas.slice().sort(function (a, b) {
    var da = ms(a.dataLimite), db = ms(b.dataLimite);
    if (da == null && db == null) return 0;
    if (da == null) return 1;
    if (db == null) return -1;
    return da - db;
  });
}

/** Extrai só a data (dd/MM/aaaa) de um valor que pode vir como ISO/Date/texto. */
function soDataBR(v) {
  var s = String(v == null ? '' : v);
  var m = s.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (m) return m[0];
  var iso = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return iso[3] + '/' + iso[2] + '/' + iso[1];
  return s;
}

/** dd/MM/aaaa → aaaa-MM-dd (para o input date); '' se não reconhecer. */
function brParaISO(s) {
  var m = String(s == null ? '' : s).match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  return m ? m[3] + '-' + m[2] + '-' + m[1] : '';
}
/** aaaa-MM-dd → dd/MM/aaaa (para gravar como na planilha); '' se vazio. */
function isoParaBR(s) {
  var m = String(s == null ? '' : s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? m[3] + '/' + m[2] + '/' + m[1] : '';
}

function salvarCampoTing(inp, campo, valor, aoSalvar) {

  chamar('salvarCampoTingimento', sessao.token, inp.getAttribute('data-linha'), campo, valor)
    .then(function () {
      inp.style.borderColor = '#1F9D55';
      if (aoSalvar) aoSalvar();
    })
    .catch(function (err) {
      inp.style.borderColor = '#D0342C';
      tratarErro(err);
    });
}

  alvo.innerHTML =

function carregarQuantidadeTingida() {

      document.getElementById('qt-data-pedido').textContent = r.dataPedido || '—';

    .catch(function (err) {
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

function renderQuantidadeTingida() {
  var wrap = document.getElementById('tabela-qtd-tingida');
  var linhas = estadoQuantidadeTingida.linhas;
  if (!linhas.length) {
    wrap.innerHTML = '<div class="vazio">Nenhum item pendente para tingir.</div>';
    return;
  }
  // Almoxarifado 1 só VÊ esta tela (não lança tingimento) — master e
  // tingimento editam. Ver `podeEditar`.
  var editavel = podeEditar(['master', 'tingimento']);
  var body = linhas.map(function (l, i) {
    return '<tr>' +
      '<td>' + (l.dataSolicitado ? l.dataSolicitado : '—') + '</td>' +
      '<td class="col-item">' + (l.item || '—') + '</td>' +
      '<td>' + (l.descricao ? l.descricao : '—') + '</td>' +
      '<td>' + (l.cliente ? l.cliente : '—') + '</td>' +
      '<td>' + (l.tipoFio ? l.tipoFio : '—') + '</td>' +
      '<td>' + (l.maquinas ? l.maquinas : '—') + '</td>' +
      '<td style="text-align:right">' + (l.total !== '' && l.total != null ? l.total : '—') + '</td>' +
      '<td style="text-align:right">' + num(l.tingido) + ' kg ' +
        (editavel
          ? '<button type="button" class="btn-atualizar-data btn-corrigir-tingido" data-idx="' + i +
            '" title="Corrigir o total tingido lançado (ex.: desfazer um lançamento errado)">✎</button>'
          : '') +
      '</td>' +
      (editavel
        ? '<td style="text-align:center">' +
            '<input type="number" class="qtd-input-grande" data-idx="' + i + '" min="0" step="any" placeholder="+ kg">' +
          '</td>' +
          '<td style="text-align:center">' +
            '<input type="checkbox" class="chk-grande chk-confirmar-tingido" data-idx="' + i +
              '" title="Marcar para confirmar e dar baixa no fio crú">' +
          '</td>'
        : '') +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' +
      '<th style="width:8%">Solicitado em</th>' +
      '<th style="width:9%">Item</th><th style="width:18%">Descrição</th>' +
      '<th style="width:10%">Cliente</th><th style="width:10%">Tipo de fio</th>' +
      '<th style="width:8%">Máquinas</th><th style="text-align:right;width:7%">Total (kg)</th>' +
      '<th style="text-align:right;width:9%">Já tingido</th>' +
      (editavel ? '<th style="width:11%">+ kg agora</th><th style="width:6%">Confirmar</th>' : '') +
    '</tr></thead><tbody>' + body + '</tbody></table>';

  if (editavel) {
    Array.prototype.forEach.call(wrap.querySelectorAll('.chk-confirmar-tingido'), function (chk) {
      chk.addEventListener('change', function () {
        if (!chk.checked) return; // a caixa só dispara a ação ao marcar
        var idx = Number(chk.getAttribute('data-idx'));
        var inp = wrap.querySelector('.qtd-input-grande[data-idx="' + idx + '"]');
        lancarQuantidadeTingidaFio(idx, inp, chk);
      });
    });
    Array.prototype.forEach.call(wrap.querySelectorAll('.btn-corrigir-tingido'), function (btn) {
      btn.addEventListener('click', function () {
        var idx = Number(btn.getAttribute('data-idx'));
        var alvo = estadoQuantidadeTingida.linhas[idx];
        if (!alvo) return;
        abrirModalCorrigirTingido(alvo.item, alvo.tingido || 0, function (novoTotal) {
          var msg = document.getElementById('qt-msg');
          btn.disabled = true;
          chamar('corrigirQuantidadeTingida', sessao.token, alvo.item, novoTotal)
            .then(function () {
              btn.disabled = false;
              alvo.tingido = novoTotal;
              renderQuantidadeTingida();
              msg.innerHTML = '<div class="aviso ok">Total tingido de "' + alvo.item + '" corrigido para ' +
                num(novoTotal) + ' kg.</div>';
            })
            .catch(function (err) {
              btn.disabled = false;
              var m = tratarErro(err);
              if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
            });
        });
      });
    });
  }
  aplicarRegua(wrap);
}

/** Modal pra corrigir o total tingido já lançado de um item — pede o valor
 * CORRETO (absoluto), não a diferença; o servidor ajusta a baixa no fio crú
 * pra bater com o novo total (credita de volta se for menor — ver
 * `corrigirQuantidadeTingida`). Serve tanto pra corrigir um valor digitado
 * errado quanto pra desfazer um lançamento de teste (corrigindo pro valor
 * de antes, ou pra zero). */
function abrirModalCorrigirTingido(item, tingidoAtual, callback) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,33,.45);' +
    'display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';
  overlay.innerHTML =
    '<div style="background:#fff;border-radius:14px;max-width:420px;width:100%;' +
      'padding:26px 26px 22px;box-shadow:0 20px 50px rgba(0,0,0,.28)">' +
      '<h3 style="margin:0 0 8px;color:#0B4576;font-size:17px">Corrigir quantidade tingida</h3>' +
      '<p style="margin:0 0 16px;color:#475569;font-size:14px;line-height:1.5">' +
        'Item ' + escAttr(item) + '. Total tingido lançado até aqui: <b>' + num(tingidoAtual) + ' kg</b>. ' +
        'Informe o valor CORRETO do total (não a diferença) — o sistema ajusta a baixa no fio crú pra ' +
        'bater com esse novo total, creditando de volta se for menor (ex.: pra desfazer um lançamento ' +
        'de teste, informe o valor de antes).</p>' +
      '<div style="margin-bottom:8px">' +
        '<label style="display:block;font-size:13px;color:#334155;margin-bottom:4px">Novo total tingido (kg)</label>' +
        '<input type="number" id="modal-corrigir-total" min="0" step="any" value="' + tingidoAtual + '" ' +
          'style="width:100%;padding:8px 10px;border:1px solid #D8E0E8;border-radius:8px;font-size:14px;box-sizing:border-box">' +
      '</div>' +
      '<div id="modal-corrigir-erro" style="color:#D0342C;font-size:13px;min-height:18px;margin-bottom:6px"></div>' +
      '<div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap">' +
        '<button id="modal-btn-secundario" style="padding:10px 16px;border:1px solid #D8E0E8;' +
          'border-radius:8px;background:#fff;cursor:pointer;font-size:14px">Cancelar</button>' +
        '<button id="modal-btn-destaque" style="padding:10px 18px;border:none;border-radius:8px;' +
          'background:#0F5FA0;color:#fff;cursor:pointer;font-size:14px;font-weight:600">Corrigir</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  var inp = overlay.querySelector('#modal-corrigir-total');
  var erroEl = overlay.querySelector('#modal-corrigir-erro');
  function fechar() { document.body.removeChild(overlay); }
  overlay.querySelector('#modal-btn-secundario').onclick = fechar;
  overlay.querySelector('#modal-btn-destaque').onclick = function () {
    var novoTotal = Number(inp.value);
    if (inp.value === '' || isNaN(novoTotal) || novoTotal < 0) {
      erroEl.textContent = 'Informe um valor válido (zero ou maior).'; return;
    }
    fechar();
    callback(novoTotal);
  };
  inp.focus();
  inp.select();
}

/** Lança a quantidade tingida digitada (soma ao total já registrado daquele
 * item) e dá baixa no fio crú — ver `registrarQuantidadeTingida`. */
function lancarQuantidadeTingidaFio(idx, inp, chk) {
  var msg = document.getElementById('qt-msg');
  var alvo = estadoQuantidadeTingida.linhas[idx];
  var quantidade = inp ? Number(inp.value) : NaN;
  if (!alvo || !inp || inp.value === '' || isNaN(quantidade) || quantidade <= 0) {
    chk.checked = false;
    if (inp) inp.style.borderColor = '#D0342C';
    return;
  }

  chk.disabled = true; inp.disabled = true;
  chamar('registrarQuantidadeTingida', sessao.token, { item: alvo.item, quantidade: quantidade })
    .then(function (r) {
      chk.disabled = false; inp.disabled = false; chk.checked = false;
      inp.value = ''; inp.style.borderColor = '';
      alvo.tingido = (alvo.tingido || 0) + quantidade;
      renderQuantidadeTingida();
      var nfsTxt = r.lotes.map(function (l) { return 'NF ' + l.nf + ' (saldo: ' + num(l.saldoApos) + ' kg)'; }).join(', ');
      msg.innerHTML = '<div class="aviso ok">Baixa no fio crú (' + r.tipoFio + ', ' + quantidade + ' kg): ' + nfsTxt + '.</div>';
    })
    .catch(function (err) {
      chk.disabled = false; inp.disabled = false; chk.checked = false;
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

/** 'dd/MM/aaaa' (como vem do servidor) → milissegundos, pra comparar datas no filtro. */
function _dataBRparaMs(s) {
  var m = String(s || '').match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  return m ? new Date(+m[3], +m[2] - 1, +m[1]).getTime() : null;
}
/** 'aaaa-MM-dd' (input date) → milissegundos locais, sem risco de fuso horário. */
function _isoParaMsLocal(iso) {
  var m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? new Date(+m[1], +m[2] - 1, +m[3]).getTime() : null;
}

function _linhasFioCruFiltradas() {
  var f = estadoFioCru.filtro;
  var tipoBusca = (f.tipoFio || '').trim().toLowerCase();
  var nfBusca = (f.nf || '').trim().toLowerCase();
  var deMs = f.dataDe ? _isoParaMsLocal(f.dataDe) : null;
  var ateMs = f.dataAte ? _isoParaMsLocal(f.dataAte) + 86399999 : null; // até o fim daquele dia
  return estadoFioCru.linhas.filter(function (l) {
    if (tipoBusca && String(l.tipoFio || '').toLowerCase().indexOf(tipoBusca) === -1) return false;
    if (nfBusca && String(l.nf || '').toLowerCase().indexOf(nfBusca) === -1) return false;
    if (deMs != null || ateMs != null) {
      var d = _dataBRparaMs(l.data);
      if (d == null) return false;
      if (deMs != null && d < deMs) return false;
      if (ateMs != null && d > ateMs) return false;
    }
    return true;
  });
}

function renderEstoqueFioCru() {
  var wrap = document.getElementById('tabela-fiocru');
  if (!estadoFioCru.linhas.length) {
    wrap.innerHTML = '<div class="vazio">Nenhum lote de fio crú cadastrado ainda.</div>';
    return;
  }
  var linhas = _linhasFioCruFiltradas();
  if (!linhas.length) {
    wrap.innerHTML = '<div class="vazio">Nenhum lote encontrado com esse filtro.</div>';
    return;
  }

  function campo(l, editando, nomeCampo, valor, tipo) {
    if (!editando) {
      if (tipo === 'numero') return valor ? num(valor) : '—';
      return (valor === '' || valor == null) ? '—' : valor;
    }
    if (tipo === 'data') {
      return '<input type="date" class="fc-edit" data-linha="' + l.linha + '" data-campo="DATA" value="' +
        brParaISO(valor) + '">';
    }
    if (tipo === 'numero') {
      return '<input type="number" class="fc-edit" data-linha="' + l.linha + '" data-campo="' + nomeCampo +
        '" min="0" step="any" value="' + (valor || '') + '">';
    }
    return '<input class="fc-edit" data-linha="' + l.linha + '" data-campo="' + nomeCampo + '" value="' +
      escAttr(valor) + '">';
  }

  var body = linhas.map(function (l) {
    var cancelado = String(l.situacao || '').trim().toUpperCase() === 'CANCELADO';
    var editando = !!estadoFioCru.editando[l.linha];
    var auditoria = l.editadoEm ? ('editado ' + l.editadoEm + ' por ' + (l.editadoPor || '—')) : '—';
    return '<tr' + (cancelado ? ' style="opacity:.55"' : (l.saldo <= 0 ? ' class="destaque"' : '')) + '>' +
      '<td style="text-align:center"><input type="checkbox" class="chk-grande chk-editar-lote" data-linha="' +
        l.linha + '"' + (editando ? ' checked' : '') + ' title="Marcar para editar este lote"></td>' +
      '<td class="col-item">' + campo(l, editando, 'TIPO_FIO', l.tipoFio) + '</td>' +
      '<td>' + campo(l, editando, 'NF', l.nf) + '</td>' +
      '<td>' + campo(l, editando, 'FORNECEDOR', l.fornecedor) + '</td>' +
      '<td title="Valor recebido na NF — fixo, nunca editável (garante o histórico de entrada)">' +
        (l.quantidade ? num(l.quantidade) : '—') + '</td>' +
      '<td>' + campo(l, editando, 'PRECO_UNITARIO', l.precoUnitario, 'numero') + '</td>' +
      '<td>' + campo(l, editando, 'DATA', l.data, 'data') + '</td>' +
      '<td style="text-align:right">' + num(l.saldo) +
        (l.ajustado ? '<br><span style="font-size:10px;color:var(--texto-fraco)">ajuste: ' +
          (l.ajustado > 0 ? '+' : '') + num(l.ajustado) + '</span>' : '') + '</td>' +
      '<td style="text-align:center"><input type="checkbox" class="chk-inicio-baixa" data-linha="' + l.linha + '"' +
        (l.inicioBaixa ? ' checked' : '') +
        ' title="Marcar esta NF como início da baixa deste tipo de fio (ignora as mais antigas que ela)"></td>' +
      '<td>' + (cancelado ? 'CANCELADO' : '—') + '</td>' +
      '<td style="font-size:10px;color:var(--texto-fraco)">' + auditoria + '</td>' +
      '<td style="white-space:nowrap">' +
        '<button type="button" class="btn-atualizar-data btn-ajustar-saldo" data-linha="' + l.linha +
          '" title="Ajustar saldo (ex.: contagem física) sem alterar a quantidade original da NF">⚖</button> ' +
        '<button type="button" class="btn-atualizar-data btn-cancelar-nf" data-linha="' + l.linha +
        '" data-cancelado="' + (cancelado ? '0' : '1') + '">' + (cancelado ? '↺' : '✕') + '</button></td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' +
      '<th style="width:5%">Editar</th>' +
      '<th style="width:11%">Tipo de fio</th><th style="width:6%">NF</th><th style="width:9%">Fornecedor</th>' +
      '<th style="width:7%">Quantidade</th><th style="width:7%">Preço unit.</th><th style="width:8%">Data</th>' +
      '<th style="text-align:right;width:6%">Saldo</th><th style="width:5%">Início</th>' +
      '<th style="width:7%">Situação</th><th style="width:14%">Última edição</th><th style="width:6%"></th>' +
    '</tr></thead><tbody>' + body + '</tbody></table>';

  Array.prototype.forEach.call(wrap.querySelectorAll('.chk-editar-lote'), function (chk) {
    chk.addEventListener('change', function () {
      estadoFioCru.editando[Number(chk.getAttribute('data-linha'))] = chk.checked;
      renderEstoqueFioCru();
    });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.fc-edit'), function (inp) {
    inp.addEventListener('change', function () {
      salvarCampoFioCru(inp, Number(inp.getAttribute('data-linha')), inp.getAttribute('data-campo'), inp.value);
    });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.chk-inicio-baixa'), function (chk) {
    chk.addEventListener('change', function () {
      var linha = Number(chk.getAttribute('data-linha'));
      var marcar = chk.checked;
      chk.disabled = true;
      chamar(marcar ? 'definirInicioBaixaFioCru' : 'removerInicioBaixaFioCru', sessao.token, linha)
        .then(function () { carregarEstoqueFioCru(); })
        .catch(function (err) { chk.disabled = false; chk.checked = !marcar; tratarErro(err); });
    });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.btn-cancelar-nf'), function (btn) {
    btn.addEventListener('click', function () {
      var linha = Number(btn.getAttribute('data-linha'));
      var novoCancelado = btn.getAttribute('data-cancelado') === '1';
      btn.disabled = true;
      chamar('definirSituacaoFioCru', sessao.token, linha, novoCancelado)
        .then(function () { carregarEstoqueFioCru(); })
        .catch(function (err) { btn.disabled = false; tratarErro(err); });
    });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.btn-ajustar-saldo'), function (btn) {
    btn.addEventListener('click', function () {
      var linha = Number(btn.getAttribute('data-linha'));
      var lote = estadoFioCru.linhas.filter(function (l) { return l.linha === linha; })[0];
      if (!lote) return;
      abrirModalAjusteSaldoFioCru(lote, function (delta, motivo) {
        btn.disabled = true;
        chamar('ajustarSaldoFioCru', sessao.token, linha, delta, motivo)
          .then(function () { carregarEstoqueFioCru(); carregarAjustesFioCru(); })
          .catch(function (err) { btn.disabled = false; tratarErro(err); });
      });
    });
  });
}

/** Modal pra registrar um ajuste manual de saldo (ex.: contagem física) — nunca
 * altera a QUANTIDADE original da NF, só soma/subtrai do saldo, com motivo e
 * autoria registrados (ver `ajustarSaldoFioCru`). Evita prompt() nativo pelo
 * mesmo motivo do `confirmarModal`: o sandbox do HtmlService pode bloqueá-lo. */
function abrirModalAjusteSaldoFioCru(lote, callback) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,33,.45);' +
    'display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';
  overlay.innerHTML =
    '<div style="background:#fff;border-radius:14px;max-width:440px;width:100%;' +
      'padding:26px 26px 22px;box-shadow:0 20px 50px rgba(0,0,0,.28)">' +
      '<h3 style="margin:0 0 8px;color:#0B4576;font-size:17px">Ajustar saldo</h3>' +
      '<p style="margin:0 0 18px;color:#475569;font-size:14px;line-height:1.5">' +
        'NF ' + escAttr(lote.nf) + ' — ' + escAttr(lote.tipoFio) + '. Saldo atual: <b>' + num(lote.saldo) + ' kg</b>. ' +
        'A quantidade original recebida na NF não é alterada — isto só corrige o saldo, com um lançamento ' +
        'à parte, auditado.</p>' +
      '<div style="margin-bottom:14px">' +
        '<label style="display:block;font-size:13px;color:#334155;margin-bottom:4px">' +
          'Diferença a aplicar no saldo (kg — negativo para reduzir)</label>' +
        '<input type="number" id="modal-ajuste-delta" step="any" ' +
          'style="width:100%;padding:8px 10px;border:1px solid #D8E0E8;border-radius:8px;font-size:14px;box-sizing:border-box">' +
      '</div>' +
      '<div style="margin-bottom:8px">' +
        '<label style="display:block;font-size:13px;color:#334155;margin-bottom:4px">Motivo</label>' +
        '<input type="text" id="modal-ajuste-motivo" placeholder="ex.: contagem física de 20/07" ' +
          'style="width:100%;padding:8px 10px;border:1px solid #D8E0E8;border-radius:8px;font-size:14px;box-sizing:border-box">' +
      '</div>' +
      '<div id="modal-ajuste-erro" style="color:#D0342C;font-size:13px;min-height:18px;margin-bottom:6px"></div>' +
      '<div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap">' +
        '<button id="modal-btn-secundario" style="padding:10px 16px;border:1px solid #D8E0E8;' +
          'border-radius:8px;background:#fff;cursor:pointer;font-size:14px">Cancelar</button>' +
        '<button id="modal-btn-destaque" style="padding:10px 18px;border:none;border-radius:8px;' +
          'background:#0F5FA0;color:#fff;cursor:pointer;font-size:14px;font-weight:600">Ajustar</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  var inpDelta = overlay.querySelector('#modal-ajuste-delta');
  var inpMotivo = overlay.querySelector('#modal-ajuste-motivo');
  var erroEl = overlay.querySelector('#modal-ajuste-erro');
  function fechar() { document.body.removeChild(overlay); }
  overlay.querySelector('#modal-btn-secundario').onclick = fechar;
  overlay.querySelector('#modal-btn-destaque').onclick = function () {
    var delta = Number(inpDelta.value);
    var motivo = inpMotivo.value.trim();
    if (inpDelta.value === '' || isNaN(delta) || delta === 0) {
      erroEl.textContent = 'Informe uma diferença de saldo diferente de zero.'; return;
    }
    if (!motivo) {
      erroEl.textContent = 'Informe o motivo do ajuste.'; return;
    }
    fechar();
    callback(delta, motivo);
  };
  inpDelta.focus();
}

/** Salva a edição de um campo de um lote (corrige valor digitado errado;
 * fica registrado com data/usuário — ver `editarLoteFioCru`). */
function salvarCampoFioCru(inp, linha, campo, valor) {
  inp.style.borderColor = '#CBD5E1';
  chamar('editarLoteFioCru', sessao.token, linha, campo, valor)
    .then(function () {
      // Qualquer edição pode mudar o saldo (o próprio ou de outro lote, se a
      // ordem por data mudar) e a auditoria — recarrega pra refletir certinho.
      carregarEstoqueFioCru();
    })
    .catch(function (err) {
      inp.style.borderColor = '#D0342C';
      tratarErro(err);
    });
}

  var painel = document.getElementById('painel-consumo');
  var abrir = painel.style.display === 'none';
  painel.style.display = abrir ? '' : 'none';
  if (abrir && !document.getElementById('cons-de').value) {
    var hoje = new Date();
    document.getElementById('cons-de').value = ymd(new Date(hoje.getFullYear(), hoje.getMonth(), 1));
    document.getElementById('cons-ate').value = ymd(hoje);
  }
}

function gerarConsumoFioCru() {
  var msg = document.getElementById('cons-msg');
  var de = document.getElementById('cons-de').value;
  var ate = document.getElementById('cons-ate').value;
  var agrupamento = document.getElementById('cons-agrupamento').value;
  if (!de || !ate) {
    msg.innerHTML = '<div class="aviso erro">Selecione as datas inicial e final.</div>';
    return;
  }
  var btn = document.getElementById('btn-gerar-consumo');
  btn.disabled = true;
  msg.innerHTML = '<div class="aviso"><span class="carregando">Gerando…</span></div>';
  chamar('listarConsumoFioCru', sessao.token, de, ate, agrupamento)
    .then(function (r) {
      btn.disabled = false;
      msg.innerHTML = '';
      renderConsumoTotais(r.totais);
      renderConsumoDetalhe(r.linhas);
    })
    .catch(function (err) {
      btn.disabled = false;
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

/** Preenche o seletor de tipo de fio do lançamento de NF com os tipos que já
 * existem no estoque (mantém a opção "novo tipo") — o usuário escolhe um
 * existente em vez de redigitar, evitando duplicar o mesmo fio com grafias
 * diferentes. Preserva a escolha atual se ela ainda estiver na lista. */
function preencherSeletorTipoFioCru(tipos) {
  var sel = document.getElementById('fc-tipo');
  if (!sel) return;
  var atual = sel.value;
  var opcoes = ['<option value="">— escolha o tipo de fio —</option>'];
  (tipos || []).forEach(function (t) {
    opcoes.push('<option value="' + escAttr(t) + '">' + t + '</option>');
  });
  opcoes.push('<option value="__novo__">+ Novo tipo de fio…</option>');
  sel.innerHTML = opcoes.join('');
  // Preserva a seleção anterior (ex.: "__novo__" enquanto digita), se ainda válida.
  if (atual && Array.prototype.some.call(sel.options, function (o) { return o.value === atual; })) {
    sel.value = atual;
  }
}

function lancarNfFioCru() {
  var msg = document.getElementById('fc-msg');
  var sel = document.getElementById('fc-tipo');
  var tipoFio = sel.value === '__novo__'
    ? document.getElementById('fc-tipo-novo').value.trim()
    : sel.value;
  if (!tipoFio) {
    msg.innerHTML = '<div class="aviso erro">Escolha o tipo de fio (ou informe um novo).</div>';
    return;
  }
  var dados = {
    tipoFio: tipoFio,
    nf: document.getElementById('fc-nf').value,
    fornecedor: document.getElementById('fc-fornecedor').value,
    quantidade: document.getElementById('fc-qtd').value,
    precoUnitario: document.getElementById('fc-preco').value,
    data: document.getElementById('fc-data').value
  };
  var btn = document.getElementById('btn-lancar-nf');
  btn.disabled = true;
  msg.innerHTML = '<div class="aviso"><span class="carregando">Lançando…</span></div>';
  chamar('lancarNotaFioCru', sessao.token, dados)
    .then(function () {
      btn.disabled = false;
      msg.innerHTML = '<div class="aviso ok">NF lançada.</div>';
      ['fc-nf', 'fc-fornecedor', 'fc-qtd', 'fc-preco', 'fc-tipo-novo'].forEach(function (id) {
        document.getElementById(id).value = '';
      });
      document.getElementById('fc-tipo-novo').style.display = 'none';
      sel.value = '';
      // Recarrega o estoque: o tipo novo (se houver) já entra no seletor.
      carregarEstoqueFioCru();
    })
    .catch(function (err) {
      btn.disabled = false;
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

  if (!linhas || !linhas.length) {
    wrap.innerHTML = '<div class="vazio">Nenhum ajuste de saldo registrado ainda.</div>';

  }
  var body = linhas.map(function (l) {
    return '<tr' + (Number(l.quantidade) < 0 ? ' class="destaque-abastecido"' : '') + '>' +
      '<td>' + (l.dataHora || '—') + '</td>' +
      '<td class="col-item">' + (l.tipoFio || '—') + '</td>' +
