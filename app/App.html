      '<td style="text-align:right">' + (Number(l.quantidade) > 0 ? '+' : '') + num(l.quantidade) + '</td>' +
      '<td>' + (l.motivo || '—') + '</td>' +
      '<td style="text-align:right">' + num(l.saldoApos) + '</td>' +
      '<td>' + (l.usuario || '—') + '</td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' +
      '<th style="width:14%">Data/hora</th><th style="width:14%">Tipo de fio</th>' +
      '<th style="width:9%">NF</th><th style="text-align:right;width:11%">Diferença</th>' +
      '<th style="width:24%">Motivo</th><th style="text-align:right;width:14%">Saldo após</th>' +
      '<th style="width:14%">Usuário</th>' +
    '</tr></thead><tbody>' + body + '</tbody></table>';
}

/* ------------------- view: Importar NF (Fio Crú) ------------------- */
// Lê o XML da NFe, descobre a filial pelo CNPJ (universal — não depende da
// unidade ativa) e cadastra os lotes no estoque de fio crú da fábrica certa.
// Cada descrição de produto da NF é associada a um tipo de fio já existente
// (seletor das duas fábricas — sem digitar, pra não duplicar grafia), com
// opção de tipo novo; a associação fica memorizada (ver NotaFioCru.gs).
var estadoImportNf = { info: null };

function viewImportarNfFioCru(alvo) {
  alvo.innerHTML =
    '<section class="painel">' +
      '<h2>Importar NF de Fio Crú (XML)</h2>' +
      '<p class="desc">Envie o <b>XML</b> da NFe. O sistema identifica a filial pelo CNPJ (destinatário ou ' +
      'local de entrega, no caso de nota triangular) e cadastra os lotes no estoque de fio crú da fábrica ' +
      'certa — não importa qual empresa está selecionada agora. Para cada produto da nota, escolha o tipo ' +
      'de fio correspondente no estoque (a associação fica salva para as próximas). O PDF (DANFE) entra ' +
      'numa etapa futura.</p>' +
      '<div class="linha-form">' +
        '<div class="campo"><label for="nf-file">Arquivo XML da NFe</label>' +
          '<input type="file" id="nf-file" accept=".xml,text/xml,application/xml"></div>' +
        '<button class="btn-principal" id="btn-ler-nf">Ler XML</button>' +
      '</div>' +
      '<div id="nf-msg"></div>' +
    '</section>' +
    '<section class="painel" id="painel-nf-preview" style="display:none">' +
      '<h2>Conferência</h2>' +
      '<div id="nf-cabecalho"></div>' +
      '<div class="tabela-wrap" id="tabela-nf-itens"></div>' +
      '<div style="margin-top:16px">' +
        '<button class="btn-principal" id="btn-gravar-nf">Cadastrar no estoque</button>' +
      '</div>' +
      '<div id="nf-msg2"></div>' +
    '</section>';

  document.getElementById('btn-ler-nf').onclick = lerXmlNfFioCru;
  document.getElementById('btn-gravar-nf').onclick = confirmarImportNfFioCru;
}

function lerXmlNfFioCru() {
  var msg = document.getElementById('nf-msg');
  var f = document.getElementById('nf-file').files[0];
  if (!f) { msg.innerHTML = '<div class="aviso erro">Escolha o arquivo XML.</div>'; return; }
  var btn = document.getElementById('btn-ler-nf');
  btn.disabled = true;
  msg.innerHTML = '<div class="aviso"><span class="carregando">Lendo o XML…</span></div>';
  var reader = new FileReader();
  reader.onload = function () {
    var b64 = String(reader.result).split(',')[1];
    chamar('analisarNfFioCruXml', sessao.token, b64, f.name)
      .then(function (r) {
        btn.disabled = false;
        estadoImportNf.info = r;
        msg.innerHTML = '<div class="aviso ok">NF ' + r.nf + ' lida — filial ' + r.filialRotulo + '.</div>';
        renderImportNfFioCru();
        document.getElementById('painel-nf-preview').style.display = '';
      })
      .catch(function (err) {
        btn.disabled = false;
        var m = tratarErro(err);
        if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
      });
  };
  reader.onerror = function () { btn.disabled = false; msg.innerHTML = '<div class="aviso erro">Falha ao ler o arquivo.</div>'; };
  reader.readAsDataURL(f);
}

/** Monta o <select> de tipo de fio de uma linha (tipos das duas fábricas +
 * opção de novo tipo), já com o valor conhecido pré-selecionado. */
function _selectTipoNf(idx, selecionado) {
  var tipos = (estadoImportNf.info && estadoImportNf.info.tiposFio) || [];
  var achouSel = false;
  var opts = ['<option value="">— escolha o tipo de fio —</option>'];
  tipos.forEach(function (t) {
    var sel = (t === selecionado);
    if (sel) achouSel = true;
    opts.push('<option value="' + escAttr(t) + '"' + (sel ? ' selected' : '') + '>' + t + '</option>');
  });
  opts.push('<option value="__novo__">+ Novo tipo de fio…</option>');
  return '<select class="assoc-select nf-tipo-sel" data-idx="' + idx + '">' + opts.join('') + '</select>' +
    '<input type="text" class="nf-tipo-novo" data-idx="' + idx + '" placeholder="descrição do novo tipo" ' +
      'style="display:none;margin-top:6px">';
}

function renderImportNfFioCru() {
  var info = estadoImportNf.info;
  if (!info) return;
  var cab = document.getElementById('nf-cabecalho');
  var avisos = '';
  if (info.triangular) {
    avisos += '<div class="aviso" style="background:#FDEEE0;color:#9A3E00">Nota triangular — filial ' +
      'definida pelo <b>local de entrega</b>.</div>';
  }
  if (info.jaLancada) {
    avisos += '<div class="aviso erro">Já existe lote(s) desta NF (' + info.nf + ') no estoque de ' +
      info.filialRotulo + '. Ao gravar, os que já existem são pulados (não duplica).</div>';
  }
  cab.innerHTML =
    '<p style="margin:0 0 12px;font-size:14px">' +
      'Filial: <b>' + info.filialRotulo + '</b> &nbsp;·&nbsp; NF: <b>' + info.nf + '</b> &nbsp;·&nbsp; ' +
      'Fornecedor: <b>' + (info.fornecedor || '—') + '</b> &nbsp;·&nbsp; Data: <b>' + (info.dataFmt || '—') + '</b>' +
    '</p>' + avisos;

  var body = info.itens.map(function (it, i) {
    var precisa = !it.tipoFio;
    return '<tr' + (precisa ? ' class="destaque"' : '') + '>' +
      '<td>' + (it.descricao || '—') + '</td>' +
      '<td style="text-align:right">' + num(it.quantidade) + (it.unidade ? ' ' + it.unidade : '') + '</td>' +
      '<td style="text-align:right">' + (it.precoUnitario ? num(it.precoUnitario) : '—') + '</td>' +
      '<td>' + _selectTipoNf(i, it.tipoFio) + '</td>' +
    '</tr>';
  }).join('');
  document.getElementById('tabela-nf-itens').innerHTML =
    '<table class="dados"><thead><tr>' +
      '<th style="width:44%">Produto na NF</th><th style="text-align:right;width:14%">Quantidade</th>' +
      '<th style="text-align:right;width:14%">Preço unit.</th><th style="width:28%">Tipo de fio no estoque</th>' +
    '</tr></thead><tbody>' + body + '</tbody></table>';

  Array.prototype.forEach.call(document.querySelectorAll('.nf-tipo-sel'), function (sel) {
    sel.addEventListener('change', function () {
      var idx = sel.getAttribute('data-idx');
      var novo = document.querySelector('.nf-tipo-novo[data-idx="' + idx + '"]');
      var ehNovo = sel.value === '__novo__';
      novo.style.display = ehNovo ? '' : 'none';
      if (ehNovo) novo.focus(); else novo.value = '';
    });
  });
}

function confirmarImportNfFioCru() {
  var info = estadoImportNf.info;
  var msg = document.getElementById('nf-msg2');
  if (!info) return;
  var itens = [];
  for (var i = 0; i < info.itens.length; i++) {
    var sel = document.querySelector('.nf-tipo-sel[data-idx="' + i + '"]');
    var tipoFio = sel.value === '__novo__'
      ? document.querySelector('.nf-tipo-novo[data-idx="' + i + '"]').value.trim()
      : sel.value;
    if (!tipoFio) {
      msg.innerHTML = '<div class="aviso erro">Falta escolher o tipo de fio de "' +
        info.itens[i].descricao + '".</div>';
      return;
    }
    itens.push({
      descricao: info.itens[i].descricao, tipoFio: tipoFio,
      quantidade: info.itens[i].quantidade, precoUnitario: info.itens[i].precoUnitario
    });
  }
  var btn = document.getElementById('btn-gravar-nf');
  btn.disabled = true;
  msg.innerHTML = '<div class="aviso"><span class="carregando">Cadastrando…</span></div>';
  chamar('gravarNfFioCruXml', sessao.token, {
    filialId: info.filialId, nf: info.nf, fornecedor: info.fornecedor, dataIso: info.dataIso, itens: itens
  }).then(function (r) {
    btn.disabled = false;
    var extra = r.jaExistiam ? ' (' + r.jaExistiam + ' já existia(m), pulado(s))' : '';
    msg.innerHTML = '<div class="aviso ok">' + r.lancados + ' lote(s) cadastrado(s) no estoque de ' +
      r.filialRotulo + extra + '.</div>';
    document.getElementById('nf-file').value = '';
    estadoImportNf.info = null;
    setTimeout(function () { document.getElementById('painel-nf-preview').style.display = 'none'; }, 1500);
  }).catch(function (err) {
    btn.disabled = false;
    var m = tratarErro(err);
    if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
  });
}

/* ------------------------- view: Usuários -------------------------- */
// Só o master acessa (ver MENUS) — o servidor confere de novo em cada
// função. A senha nunca aparece na lista geral; só quando o master clica
// em "ver senha" numa linha específica (ver `revelarSenhaUsuario`).
var estadoUsuarios = { lista: [], senhasVisiveis: {} };

function viewUsuarios(alvo) {
  alvo.innerHTML =
    '<section class="painel">' +
      '<h2>Novo usuário</h2>' +
      '<p class="desc">A senha é guardada de forma segura (hash) pra validar o login, e também cifrada ' +
      'de um jeito que só esta tela consegue mostrar de volta — quem abre a planilha direto não lê a ' +
      'senha de ninguém.</p>' +
      '<div class="linha-form">' +
        '<div class="campo"><label for="us-usuario">Usuário (login)</label><input type="text" id="us-usuario"></div>' +
        '<div class="campo"><label for="us-nome">Nome</label><input type="text" id="us-nome"></div>' +
        '<div class="campo" style="max-width:180px"><label for="us-papel">Papel</label>' +
          '<select id="us-papel">' +
            '<option value="master">Master</option>' +
            '<option value="tingimento">Tingimento</option>' +
            '<option value="almoxarifado1">Almoxarifado 1</option>' +
            '<option value="almoxarifado2">Almoxarifado 2</option>' +
            '<option value="programacao">Programação</option>' +
          '</select></div>' +
        '<div class="campo" style="max-width:180px"><label for="us-senha">Senha</label><input type="text" id="us-senha"></div>' +
        '<div class="campo" style="flex:1;min-width:200px"><label>Empresas que pode ver</label>' +
          '<div id="us-unidades" style="display:flex;gap:14px;flex-wrap:wrap;padding-top:8px">' +
            (sessao.unidades || []).map(function (u) {
              return '<label style="font-weight:400;white-space:nowrap">' +
                '<input type="checkbox" class="us-unidade-chk" value="' + escAttr(u.id) + '" checked> ' +
                escAttr(u.rotulo) + '</label>';
            }).join('') +
          '</div></div>' +
        '<button class="btn-principal" id="btn-criar-usuario">Cadastrar</button>' +
      '</div>' +
      '<div id="us-msg"></div>' +
    '</section>' +
    '<section class="painel">' +
      '<h2>Usuários cadastrados</h2>' +
      '<div class="tabela-wrap" id="tabela-usuarios"></div>' +
    '</section>';

  document.getElementById('btn-criar-usuario').onclick = criarUsuario;
  carregarUsuarios();
}

function criarUsuario() {
  var msg = document.getElementById('us-msg');
  var unidadesSel = Array.prototype.map.call(
    document.querySelectorAll('#us-unidades .us-unidade-chk:checked'),
    function (c) { return c.value; });
  var dados = {
    usuario: document.getElementById('us-usuario').value.trim(),
    nome: document.getElementById('us-nome').value.trim(),
    papel: document.getElementById('us-papel').value,
    senha: document.getElementById('us-senha').value,
    unidades: unidadesSel,
    ativo: true
  };
  if (!dados.usuario) { msg.innerHTML = '<div class="aviso erro">Informe o usuário (login).</div>'; return; }
  if (!dados.senha) { msg.innerHTML = '<div class="aviso erro">Informe uma senha.</div>'; return; }
  var btn = document.getElementById('btn-criar-usuario');
  btn.disabled = true;
  msg.innerHTML = '<div class="aviso"><span class="carregando">Cadastrando…</span></div>';
  chamar('salvarUsuario', sessao.token, dados)
    .then(function () {
      btn.disabled = false;
      msg.innerHTML = '<div class="aviso ok">Usuário "' + dados.usuario + '" cadastrado.</div>';
      ['us-usuario', 'us-nome', 'us-senha'].forEach(function (id) { document.getElementById(id).value = ''; });
      document.getElementById('us-papel').value = 'master';
      Array.prototype.forEach.call(document.querySelectorAll('#us-unidades .us-unidade-chk'), function (c) { c.checked = true; });
      carregarUsuarios();
    })
    .catch(function (err) {
      btn.disabled = false;
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

function carregarUsuarios() {
  var wrap = document.getElementById('tabela-usuarios');
  wrap.innerHTML = '<div class="aviso"><span class="carregando">Carregando…</span></div>';
  chamar('listarUsuarios', sessao.token)
    .then(function (r) {
      estadoUsuarios.lista = r.usuarios || [];
      estadoUsuarios.senhasVisiveis = {};
      renderUsuarios();
    })
    .catch(function (err) {
      var m = tratarErro(err);
      if (m) wrap.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

/** Salva um campo de um usuário já existente (reenvia o registro atual com o
 * campo trocado — `salvarUsuario` exige papel válido sempre). Recarrega a
 * lista pra refletir o estado real da planilha. */
function salvarCampoUsuario(usuario, patch, elemento) {
  var u = estadoUsuarios.lista.filter(function (x) { return x.usuario === usuario; })[0];
  if (!u) return;
  var dados = { usuario: usuario, nome: u.nome, papel: u.papel, ativo: u.ativo, unidades: u.unidades || [] };
  Object.keys(patch).forEach(function (k) { dados[k] = patch[k]; });
  if (elemento) elemento.disabled = true;
  var msg = document.getElementById('us-msg');
  chamar('salvarUsuario', sessao.token, dados)
    .then(function () {
      if (msg) msg.innerHTML = '<div class="aviso ok">Usuário "' + usuario + '" atualizado.</div>';
      delete estadoUsuarios.senhasVisiveis[usuario]; // senha pode ter mudado — não deixa a antiga visível
      carregarUsuarios();
    })
    .catch(function (err) {
      if (elemento) elemento.disabled = false;
      if (msg) { var m = tratarErro(err); if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>'; }
    });
}

function renderUsuarios() {
  var wrap = document.getElementById('tabela-usuarios');
  var lista = estadoUsuarios.lista;
  if (!lista.length) { wrap.innerHTML = '<div class="vazio">Nenhum usuário cadastrado.</div>'; return; }
  var body = lista.map(function (u) {
    var senhaVisivel = estadoUsuarios.senhasVisiveis[u.usuario];
    return '<tr' + (u.ativo ? '' : ' style="opacity:.55"') + '>' +
      '<td class="col-item">' + u.usuario + '</td>' +
      '<td><input class="obs-input us-nome-input" data-usuario="' + escAttr(u.usuario) + '" value="' +
        escAttr(u.nome) + '"></td>' +
      '<td><select class="assoc-select us-papel-select" data-usuario="' + escAttr(u.usuario) + '">' +
        ['master', 'tingimento', 'almoxarifado1', 'almoxarifado2', 'programacao'].map(function (p) {
          return '<option value="' + p + '"' + (p === u.papel ? ' selected' : '') + '>' +
            (ROTULO_PAPEL[p] || p) + '</option>';
        }).join('') +
      '</select></td>' +
      '<td>' + (sessao.unidades || []).map(function (un) {
          var marc = (u.unidades || []).indexOf(un.id) !== -1;
          return '<label style="font-weight:400;white-space:nowrap;margin-right:10px">' +
            '<input type="checkbox" class="us-unidade-row-chk" data-usuario="' + escAttr(u.usuario) +
            '" value="' + escAttr(un.id) + '"' + (marc ? ' checked' : '') + '> ' + escAttr(un.rotulo) + '</label>';
        }).join('') +
        (u.todasUnidades ? ' <span class="badge-tingido-parcial" title="Vale para todas as empresas, inclusive futuras">todas</span>' : '') +
      '</td>' +
      '<td style="text-align:center"><input type="checkbox" class="chk-grande us-ativo-chk" data-usuario="' +
        escAttr(u.usuario) + '"' + (u.ativo ? ' checked' : '') + '></td>' +
      '<td style="white-space:nowrap">' +
        (senhaVisivel
          ? '<code>' + escAttr(senhaVisivel) + '</code> <button type="button" ' +
            'class="btn-atualizar-data btn-ocultar-senha" data-usuario="' + escAttr(u.usuario) +
            '" title="Ocultar">🙈</button>'
          : '<button type="button" class="btn-atualizar-data btn-ver-senha" data-usuario="' +
            escAttr(u.usuario) + '" title="Ver senha">👁</button>') +
        ' <button type="button" class="btn-atualizar-data btn-nova-senha" data-usuario="' +
          escAttr(u.usuario) + '" title="Definir nova senha">🔑</button>' +
      '</td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' +
      '<th style="width:12%">Usuário</th><th style="width:16%">Nome</th><th style="width:14%">Papel</th>' +
      '<th style="width:18%">Empresas</th>' +
      '<th style="text-align:center;width:7%">Ativo</th><th style="width:33%">Senha</th>' +
    '</tr></thead><tbody>' + body + '</tbody></table>';

  Array.prototype.forEach.call(wrap.querySelectorAll('.us-nome-input'), function (inp) {
    inp.addEventListener('change', function () {
      salvarCampoUsuario(inp.getAttribute('data-usuario'), { nome: inp.value }, inp);
    });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.us-papel-select'), function (sel) {
    sel.addEventListener('change', function () {
      salvarCampoUsuario(sel.getAttribute('data-usuario'), { papel: sel.value }, sel);
    });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.us-unidade-row-chk'), function (chk) {
    chk.addEventListener('change', function () {
      var usuario = chk.getAttribute('data-usuario');
      var marcadas = [];
      Array.prototype.forEach.call(wrap.querySelectorAll('.us-unidade-row-chk'), function (c) {
        if (c.getAttribute('data-usuario') === usuario && c.checked) marcadas.push(c.value);
      });
      salvarCampoUsuario(usuario, { unidades: marcadas }, chk);
    });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.us-ativo-chk'), function (chk) {
    chk.addEventListener('change', function () {
      var usuario = chk.getAttribute('data-usuario');
      chk.disabled = true;
      chamar('definirAtivoUsuario', sessao.token, usuario, chk.checked)
        .then(function () {
          chk.disabled = false;
          var u = estadoUsuarios.lista.filter(function (x) { return x.usuario === usuario; })[0];
          if (u) u.ativo = chk.checked;
          renderUsuarios();
        })
        .catch(function (err) { chk.disabled = false; chk.checked = !chk.checked; tratarErro(err); });
    });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.btn-ver-senha'), function (btn) {
    btn.addEventListener('click', function () {
      var usuario = btn.getAttribute('data-usuario');
      btn.disabled = true;
      chamar('revelarSenhaUsuario', sessao.token, usuario)
        .then(function (r) {
          btn.disabled = false;
          estadoUsuarios.senhasVisiveis[usuario] = r.senha;
          renderUsuarios();
        })
        .catch(function (err) { btn.disabled = false; tratarErro(err); });
    });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.btn-ocultar-senha'), function (btn) {
    btn.addEventListener('click', function () {
      delete estadoUsuarios.senhasVisiveis[btn.getAttribute('data-usuario')];
      renderUsuarios();
    });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.btn-nova-senha'), function (btn) {
    btn.addEventListener('click', function () {
      var usuario = btn.getAttribute('data-usuario');
      abrirModalNovaSenha(usuario, function (novaSenha) {
        salvarCampoUsuario(usuario, { senha: novaSenha }, btn);
      });
    });
  });
}

/** Modal pra definir uma senha nova pra um usuário (evita prompt() nativo —
 * o sandbox do HtmlService pode bloqueá-lo). Texto visível (não mascarado)
 * de propósito, pra o master conferir o que está digitando antes de salvar. */
function abrirModalNovaSenha(usuario, callback) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,33,.45);' +
    'display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';
  overlay.innerHTML =
    '<div style="background:#fff;border-radius:14px;max-width:400px;width:100%;' +
      'padding:26px 26px 22px;box-shadow:0 20px 50px rgba(0,0,0,.28)">' +
      '<h3 style="margin:0 0 8px;color:#0B4576;font-size:17px">Nova senha</h3>' +
      '<p style="margin:0 0 16px;color:#475569;font-size:14px;line-height:1.5">Usuário: <b>' +
        escAttr(usuario) + '</b></p>' +
      '<div style="margin-bottom:8px">' +
        '<label style="display:block;font-size:13px;color:#334155;margin-bottom:4px">Senha nova</label>' +
        '<input type="text" id="modal-nova-senha" ' +
          'style="width:100%;padding:8px 10px;border:1px solid #D8E0E8;border-radius:8px;font-size:14px;box-sizing:border-box">' +
      '</div>' +
      '<div id="modal-nova-senha-erro" style="color:#D0342C;font-size:13px;min-height:18px;margin-bottom:6px"></div>' +
      '<div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap">' +
        '<button id="modal-btn-secundario" style="padding:10px 16px;border:1px solid #D8E0E8;' +
          'border-radius:8px;background:#fff;cursor:pointer;font-size:14px">Cancelar</button>' +
        '<button id="modal-btn-destaque" style="padding:10px 18px;border:none;border-radius:8px;' +
          'background:#0F5FA0;color:#fff;cursor:pointer;font-size:14px;font-weight:600">Salvar</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  var inp = overlay.querySelector('#modal-nova-senha');
  var erroEl = overlay.querySelector('#modal-nova-senha-erro');
  function fechar() { document.body.removeChild(overlay); }
  overlay.querySelector('#modal-btn-secundario').onclick = fechar;

}

/* Configuração (master) dos dias em que o embarque chega na empresa ativa. */
function toggleConfigChegada() {
  var painel = document.getElementById('painel-config-chegada');
  var abrir = painel.style.display === 'none';
  painel.style.display = abrir ? '' : 'none';
  if (abrir) carregarConfigChegada();
}

function carregarConfigChegada() {
  var wrap = document.getElementById('chegada-dias');
  var nomes = { 1: 'Segunda', 2: 'Terça', 3: 'Quarta', 4: 'Quinta', 5: 'Sexta', 6: 'Sábado', 7: 'Domingo' };
  chamar('obterConfigChegada', sessao.token)
    .then(function (r) {
      var dias = r.dias || [];
      wrap.innerHTML = [1, 2, 3, 4, 5, 6, 7].map(function (n) {
        return '<label style="font-weight:400;white-space:nowrap">' +
          '<input type="checkbox" class="chk-chegada-dia" value="' + n + '"' +
          (dias.indexOf(n) !== -1 ? ' checked' : '') + '> ' + nomes[n] + '</label>';
      }).join('');
      document.getElementById('chegada-prazo').value = r.prazoDias != null ? r.prazoDias : 3;
      document.getElementById('btn-salvar-chegada').onclick = salvarConfigChegada;
    })
    .catch(function (err) {
      var m = tratarErro(err);
      if (m) document.getElementById('chegada-msg').innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

function salvarConfigChegada() {
  var msg = document.getElementById('chegada-msg');
  var dias = [];
  Array.prototype.forEach.call(document.querySelectorAll('.chk-chegada-dia'), function (c) {
    if (c.checked) dias.push(Number(c.value));
  });
  var prazo = document.getElementById('chegada-prazo').value;
  var btn = document.getElementById('btn-salvar-chegada');
  btn.disabled = true;
  msg.innerHTML = '<div class="aviso"><span class="carregando">Salvando…</span></div>';
  chamar('salvarConfigChegada', sessao.token, dias, prazo)
    .then(function () {
      btn.disabled = false;
      msg.innerHTML = '<div class="aviso ok">Dias de recebimento salvos.</div>';
      carregarRelatorio(); // recalcula as previsões com a configuração nova
    })
    .catch(function (err) {
      btn.disabled = false;
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

function carregarRelatorio() {
  var msg = document.getElementById('rel-msg');
  msg.innerHTML = '<div class="aviso"><span class="carregando">Carregando…</span></div>';
  chamar('obterRelatorioCompraAtual', sessao.token)
    .then(function (r) {
      msg.innerHTML = '';
      document.getElementById('rel-titulo').textContent =
        'PEDIDO DE FIO MARFIM ' + (r.unidadeRotulo || '').toUpperCase();
      document.getElementById('rel-numero').textContent = r.numeroPedido != null ? r.numeroPedido : '—';
      document.getElementById('rel-data').textContent = r.dataPedido || '—';
      document.getElementById('rel-atualizado-em').textContent = r.atualizadoEm || '—';
      // Sem dias de recebimento configurados, a coluna de previsão não calcula.
      if (!(r.chegadaDias || []).length) {
        msg.innerHTML = '<div class="aviso">Previsão de chegada indisponível: os <b>dias de recebimento</b> ' +
          'desta empresa ainda não foram configurados' +
          (podeEditar(['master']) ? ' (botão "Dias de recebimento" acima).' : ' — peça ao master.') + '</div>';
      } else {
        msg.innerHTML = '<div class="aviso ok">Chegadas nesta empresa: <b>' +
          (r.chegadaRotulos || []).join(', ') + '</b> · prazo mínimo de ' + r.chegadaPrazoDias + ' dia(s).</div>';
      }
      estadoRelatorio.linhas = r.linhas || [];
      renderRelatorio();
    })
    .catch(function (err) {
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

function renderRelatorio() {
  var wrap = document.getElementById('tabela-relatorio');
  var linhas = estadoRelatorio.linhas;
  if (!linhas.length) {
    wrap.innerHTML = '<div class="vazio">Nenhum item pendente no momento.</div>';
    return;
  }
  var body = linhas.map(function (l) {
    // Uma linha por remessa a caminho: cada relatório de embarque pendente
    // mostra a SUA previsão e os kg daquela remessa. Parcial já recebido não
    // aparece (fica sem data até vir o saldo em outro relatório).
    var prevCel = '—';
    var remessas = l.remessas || [];
    if (remessas.length) {
      prevCel = remessas.map(function (v) {
        var dado = v.previsaoChegada
          ? '<b style="color:#0B4576">' + v.previsaoChegada + '</b>'
          : '<span class="sem-desc">a definir</span>';
        return '<div title="Embarque ' + escAttr(v.numero) + ' de ' + escAttr(v.dataEmbarque || '—') + '">' +
          dado + ' <span style="color:#64748b">· ' + num(v.quantidade) + ' kg</span></div>';
      }).join('');
    }
    // Linha "embarcado": item que já saiu da lista pendente (o embarque foi
    // lançado) mas ainda não chegou — continua aqui até ser marcado CHEGOU.
    var embarcado = l.status === 'embarcado';
    return '<tr' + (l.saldoCritico ? ' class="destaque"' : (embarcado ? ' class="destaque-tingido-completo"' : '')) + '>' +
      '<td>' + (l.dataSolicitado ? l.dataSolicitado : '—') + '</td>' +
      '<td class="col-item">' + (l.item || '—') +
        (embarcado ? ' <span class="badge-tingido-completo">embarcado</span>' : '') + '</td>' +
      '<td>' + (l.descricao ? l.descricao : '—') + '</td>' +
      '<td>' + (l.cliente ? l.cliente : '—') + '</td>' +
      '<td>' + (l.maquinas ? l.maquinas : '—') + '</td>' +
      '<td style="text-align:right">' + (l.total !== '' && l.total != null ? l.total : '—') + '</td>' +
      '<td>' + (l.dataLimite ? l.dataLimite : '—') + '</td>' +
      '<td>' + prevCel + '</td>' +
      '<td>' + (l.obs ? l.obs : '—') + '</td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' +
      '<th style="width:8%">Solicitado em</th><th style="width:9%">Item</th>' +
      '<th style="width:20%">Descrição</th><th style="width:12%">Cliente</th>' +
      '<th style="width:11%">Máquinas</th><th style="text-align:right;width:7%">Total (kg)</th>' +
      '<th style="width:9%">Data limite</th><th style="width:10%">Previsão de chegada</th>' +
      '<th style="width:14%">Observação</th>' +
    '</tr></thead><tbody>' + body + '</tbody></table>';
  aplicarRegua(wrap);
}

function viewEstoqueUnidades(alvo) {

function carregarEstoqueUnidades() {

function renderEstoqueUnidades() {
  var wrap = document.getElementById('tabela-estoque-unidades');
  var linhas = estadoEstoqueUnidades.linhas;
  var outra = estadoEstoqueUnidades.unidadeOutra || 'outra unidade';
  if (!linhas.length) {
    wrap.innerHTML = '<div class="vazio">Nenhum item pendente de compra no momento.</div>';
    return;
  }
  var comEstoque = linhas.filter(function (l) { return !l.semPar && Number(l.saldoOutra) > 0; }).length;
  var semPar = linhas.filter(function (l) { return l.semPar; }).length;

  var body = linhas.map(function (l, i) {
    var temSaldo = !l.semPar && Number(l.saldoOutra) > 0;
    var rowClass = temSaldo ? ' class="destaque-tingido-completo"' : (l.semPar ? ' class="destaque-abastecido"' : '');
    var dataCel = '—';
    if (!l.semPar && l.dataOutra) {
      var velho = l.diasOutra != null && l.diasOutra > 60;
      dataCel = '<span style="' + (velho ? 'color:#C0392B;font-weight:600' : '') + '">' + l.dataOutra + '</span>';
    }
    var ladoOutra = l.semPar
      ? '<span class="sem-desc">sem par</span>'
      : (escAttr(l.itemOutra) + (l.origem === 'automático' ? ' <span class="badge-tingido-parcial">auto</span>' : ''));
    var saldoCel = l.semPar ? '—' : (l.saldoOutra != null ? num(l.saldoOutra) : '—');
    var vincCel = '<button class="btn-atualizar-data eu-vinc-btn" data-idx="' + i + '" ' +
      'style="white-space:nowrap">' + (l.semPar ? 'vincular' : 'trocar') + '</button>';
    var saldoAquiCel = (l.saldoAqui != null && l.saldoAqui !== '')
      ? '<span style="' + (l.saldoCriticoAqui ? 'color:#C0392B;font-weight:600' : '') + '">' + num(l.saldoAqui) + '</span>'
      : '—';
    return '<tr' + rowClass + '>' +
      '<td class="col-item">' + (escAttr(l.item) || '—') + '</td>' +
      '<td>' + (l.descricao ? escAttr(l.descricao) : '—') + '</td>' +
      '<td style="text-align:right">' + saldoAquiCel + '</td>' +
      '<td style="text-align:right">' + (l.aComprar != null && l.aComprar !== '' ? num(l.aComprar) : '—') + '</td>' +
      '<td>' + (l.dataLimite || '—') + '</td>' +
      '<td>' + ladoOutra + '</td>' +
      '<td style="text-align:right">' + saldoCel + '</td>' +
      '<td>' + dataCel + '</td>' +
      '<td>' + vincCel + '</td>' +
    '</tr>';
  }).join('');

  wrap.innerHTML =
    '<p class="desc" style="margin-top:0">' + linhas.length + ' item(ns) pendente(s) · ' +
      comEstoque + ' com saldo na ' + escAttr(outra) + ' · ' + semPar + ' sem par.</p>' +
    '<table class="dados"><thead><tr>' +
      '<th style="width:11%">Item (aqui)</th><th style="width:17%">Descrição</th>' +
      '<th style="text-align:right;width:7%">Saldo (aqui)</th>' +
      '<th style="text-align:right;width:7%">A comprar</th><th style="width:8%">Data limite</th>' +
      '<th style="width:16%">Item na ' + escAttr(outra) + '</th>' +
      '<th style="text-align:right;width:7%">Saldo lá</th><th style="width:9%">Data do saldo</th>' +
      '<th style="width:7%">Vincular</th>' +
    '</tr></thead><tbody>' + body + '</tbody></table>';

  Array.prototype.forEach.call(wrap.querySelectorAll('.eu-vinc-btn'), function (btn) {
    btn.addEventListener('click', function () {
      var l = linhas[Number(btn.getAttribute('data-idx'))];
      abrirModalVincularUnidade(l.item, l.semPar ? '' : l.itemOutra, function (itemLa) {
        vincularEstoqueUnidade(l.item, itemLa);
      });

  });
  aplicarRegua(wrap);
}

/**
 * Seletor de item da outra unidade (evita o datalist, que não reabre pra
 * trocar e filtra por qualquer trecho). Busca por PREFIXO (esquerda→direita):
 * digitar "4662" mostra os itens que começam com 4662. Mostra saldo e data.
 */
function abrirModalVincularUnidade(itemAqui, itemAtual, callback) {
  var itens = estadoEstoqueUnidades.itensOutra || [];
  var outra = estadoEstoqueUnidades.unidadeOutra || 'outra unidade';
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,33,.45);' +
    'display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';
  overlay.innerHTML =
    '<div style="background:#fff;border-radius:14px;max-width:520px;width:100%;' +
      'padding:22px 24px;box-shadow:0 20px 50px rgba(0,0,0,.28)">' +
      '<h3 style="margin:0 0 4px;color:#0B4576;font-size:17px">Vincular no estoque da ' + escAttr(outra) + '</h3>' +
      '<p style="margin:0 0 12px;color:#475569;font-size:13px">Item daqui: <b>' + escAttr(itemAqui) + '</b>' +
        (itemAtual ? ' · vínculo atual: <b>' + escAttr(itemAtual) + '</b>' : '') +
        '. Digite o começo do código/nome pra filtrar.</p>' +
      '<input id="mv-busca" type="text" placeholder="ex.: 4662" autocomplete="off" ' +
        'style="width:100%;padding:9px 11px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;box-sizing:border-box">' +
      '<div id="mv-lista" style="margin-top:10px;max-height:300px;overflow-y:auto;border:1px solid #eef2f6;border-radius:8px"></div>' +
      '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">' +
        '<button id="mv-cancelar" style="padding:10px 16px;border:1px solid #D8E0E8;border-radius:8px;' +
          'background:#fff;cursor:pointer;font-size:14px">Cancelar</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  var busca = overlay.querySelector('#mv-busca');
  var lista = overlay.querySelector('#mv-lista');
  function fechar() { if (overlay.parentNode) document.body.removeChild(overlay); }
  function render() {
    var termo = busca.value.trim().toLowerCase();
    var achou = itens.filter(function (it) {
      return !termo || String(it.item).toLowerCase().indexOf(termo) === 0; // PREFIXO
    });
    var mostra = achou.slice(0, 200);
    if (!mostra.length) {
      lista.innerHTML = '<div style="padding:12px;color:#94a3b8;font-size:13px">Nenhum item começa com isso.</div>';
      return;
    }
    lista.innerHTML = mostra.map(function (it) {
      return '<div class="mv-opt" data-item="' + escAttr(it.item) + '" ' +
        'style="padding:8px 11px;border-bottom:1px solid #f1f5f9;cursor:pointer;font-size:13px">' +
        '<b>' + escAttr(it.item) + '</b> <span style="color:#64748b">— saldo ' +
        (it.saldo != null ? it.saldo : '—') + (it.data ? ' (' + it.data + ')' : '') + '</span></div>';
    }).join('') + (achou.length > mostra.length
      ? '<div style="padding:8px 11px;color:#94a3b8;font-size:12px">…refine a busca (' + achou.length + ' itens)</div>'
      : '');
    Array.prototype.forEach.call(lista.querySelectorAll('.mv-opt'), function (o) {
      o.onclick = function () { fechar(); callback(o.getAttribute('data-item')); };
    });
  }
  busca.addEventListener('input', render);
  overlay.querySelector('#mv-cancelar').onclick = fechar;
  overlay.addEventListener('click', function (e) { if (e.target === overlay) fechar(); });
  render();
  busca.focus();
}

function vincularEstoqueUnidade(itemAqui, itemOutra) {
  var msg = document.getElementById('eu-msg');
  if (!itemOutra || !itemOutra.trim()) {
    msg.innerHTML = '<div class="aviso erro">Escolha o item da outra unidade para vincular.</div>';
    return;
  }
  msg.innerHTML = '<div class="aviso"><span class="carregando">Vinculando…</span></div>';
  chamar('vincularItemEntreUnidades', sessao.token, itemAqui, itemOutra.trim())
    .then(function () { carregarEstoqueUnidades(); })
    .catch(function (err) {
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

      '</div>' +
      '<div id="consulta-msg"></div>' +
      '<div class="tabela-wrap" id="tabela-consulta"></div>' +
    '</section>';
  document.getElementById('btn-consultar').onclick = consultarEstoque;
  document.getElementById('consulta-item').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') consultarEstoque();
  });
  // Preenche o autocomplete com os itens do estoque.
  chamar('listarItensEstoque', sessao.token)
    .then(function (r) {
      var dl = document.getElementById('itens-estoque');
      if (!dl) return;
      dl.innerHTML = (r.itens || []).map(function (it) {
        return '<option value="' + escAttr(it) + '">';
      }).join('');
    })
    .catch(function () { /* silencioso — a busca por texto continua funcionando */ });
}

function consultarEstoque() {
  var termo = document.getElementById('consulta-item').value.trim();
  var msg = document.getElementById('consulta-msg');
  var wrap = document.getElementById('tabela-consulta');
  if (!termo) { msg.innerHTML = '<div class="aviso erro">Digite um item para buscar.</div>'; return; }
  msg.innerHTML = '<div class="aviso"><span class="carregando">Buscando…</span></div>';
  wrap.innerHTML = '';
  chamar('consultarHistoricoItem', sessao.token, termo)
    .then(function (r) {
      if (!r.linhas.length) {
        msg.innerHTML = '<div class="aviso">Nenhum registro encontrado para "' + termo + '".</div>';
        return;
      }
      msg.innerHTML = '<div class="aviso ok">' + r.total + ' registro(s)' +
        (r.truncado ? ' (mostrando os 1000 mais recentes)' : '') + '.</div>';
      renderHistorico(r.cabecalho, r.linhas);
    })
    .catch(function (err) {
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

function renderHistorico(cabecalho, linhas) {
  var wrap = document.getElementById('tabela-consulta');
  var th = cabecalho.map(function (c) { return '<th>' + c + '</th>'; }).join('');
  var body = linhas.map(function (row) {
    return '<tr>' + row.map(function (v) {
      return '<td>' + (v !== '' && v != null ? v : '—') + '</td>';
    }).join('') + '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' + th + '</tr></thead><tbody>' + body + '</tbody></table>';
}

/* ----------------- view: Importar Embarque (PDF) ------------------ */
var embarqueItens = [];

function viewImportarEmbarque(alvo) {
  alvo.innerHTML =
    '<section class="painel">' +
      '<h2>Importar Embarque (PDF)</h2>' +
      '<p class="desc">Selecione o PDF do relatório de embarque. O sistema lê e ' +
      'preenche a aba EMBARQUES (item, quantidade, nº do embarque e data). ' +
      'Itens não reconhecidos ficam destacados para você corrigir — e o sistema ' +
      'aprende para as próximas vezes.</p>' +
      '<div class="linha-form">' +
        '<div class="campo" style="flex:1;min-width:240px">' +
          '<label for="pdf-file">Arquivo PDF</label>' +
          '<input type="file" id="pdf-file" accept="application/pdf">' +
        '</div>' +
        '<button class="btn-principal" id="btn-ler-pdf">Ler PDF</button>' +
      '</div>' +
      '<div id="embarque-msg"></div>' +
      '<datalist id="itens-estoque-emb"></datalist>' +
      '<div style="margin-top:18px">' +
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">' +
          '<b style="font-size:13px;color:var(--texto-fraco)">Últimos embarques lançados</b>' +
          '<button type="button" class="btn-atualizar-data" id="btn-atualizar-ultimos-embarques" ' +
            'title="Atualizar esta lista">↻</button>' +
        '</div>' +
        '<div id="ultimos-embarques"></div>' +
      '</div>' +
    '</section>' +
    '<section class="painel" id="painel-embarque" style="display:none">' +
      '<h2>Conferência</h2>' +
      '<div class="linha-form">' +
        '<div class="campo"><label for="emb-doc">Nº do embarque</label>' +
          '<input type="text" id="emb-doc" style="max-width:140px"></div>' +
        '<div class="campo"><label for="emb-data">Data</label>' +
          '<input type="date" id="emb-data" style="max-width:170px"></div>' +
      '</div>' +
      '<div class="tabela-wrap" id="tabela-embarque"></div>' +
      '<div style="margin-top:16px">' +
        '<button class="btn-principal" id="btn-gravar-embarque">Confirmar e gravar</button>' +
      '</div>' +
      '<div id="gravar-embarque-msg"></div>' +
      '<details style="margin-top:18px">' +
        '<summary style="cursor:pointer;color:var(--texto-fraco);font-size:12px">Ver texto lido do PDF (conferência)</summary>' +
        '<pre id="embarque-texto-bruto" style="white-space:pre-wrap;font-size:11px;background:#F7FAFD;border:1px solid var(--borda);border-radius:8px;padding:10px;margin-top:8px;max-height:260px;overflow:auto"></pre>' +
      '</details>' +
    '</section>';

  document.getElementById('btn-ler-pdf').onclick = lerArquivoPdf;
  document.getElementById('btn-gravar-embarque').onclick = gravarEmbarqueConfirmado;
  document.getElementById('btn-atualizar-ultimos-embarques').onclick = carregarUltimosEmbarques;

  // autocomplete de itens (para corrigir os não reconhecidos)
  chamar('listarItensEstoque', sessao.token).then(function (r) {
    var dl = document.getElementById('itens-estoque-emb');
    if (dl) dl.innerHTML = (r.itens || []).map(function (it) {
      return '<option value="' + escAttr(it) + '">';
    }).join('');
  }).catch(function () {});

  carregarUltimosEmbarques();
}

/** Busca e mostra os últimos embarques lançados (para o usuário se
 * localizar antes de importar um novo PDF — ver se algum número ficou
 * faltando na sequência). Roda ao abrir a tela e depois de cada gravação. */
function carregarUltimosEmbarques() {
  var wrap = document.getElementById('ultimos-embarques');
  if (!wrap) return;
  wrap.innerHTML = '<div class="aviso"><span class="carregando">Carregando…</span></div>';
  chamar('listarUltimosEmbarques', sessao.token, 5)
    .then(function (r) {
      var numeros = r.numeros || [];
      wrap.innerHTML = numeros.length
        ? '<p class="desc" style="margin:0">' + numeros.map(escAttr).join(' &nbsp;•&nbsp; ') + '</p>'
        : '<div class="vazio">Nenhum embarque lançado ainda.</div>';
    })
    .catch(function () {
      wrap.innerHTML = '';
    });
}

function lerArquivoPdf() {
  var msg = document.getElementById('embarque-msg');
  var f = document.getElementById('pdf-file').files[0];
  if (!f) { msg.innerHTML = '<div class="aviso erro">Escolha um arquivo PDF.</div>'; return; }
  var btn = document.getElementById('btn-ler-pdf');
  btn.disabled = true;
  msg.innerHTML = '<div class="aviso"><span class="carregando">Lendo o PDF…</span></div>';
  var reader = new FileReader();
  reader.onload = function () {
    var b64 = String(reader.result).split(',')[1];
    chamar('analisarEmbarquePdf', sessao.token, b64, f.name)
      .then(function (r) {
        btn.disabled = false;
        embarqueItens = r.itens || [];
        document.getElementById('emb-doc').value = r.doc || '';
        document.getElementById('emb-data').value = brParaISO(r.data);
        var aviso = r.naoReconhecidos
          ? '<div class="aviso erro">' + r.naoReconhecidos + ' item(ns) não reconhecido(s). Corrija os destacados antes de gravar.</div>'
          : '<div class="aviso ok">' + embarqueItens.length + ' itens lidos. Confira e grave.</div>';
        msg.innerHTML = aviso;
        renderPreviewEmbarque(embarqueItens);
        document.getElementById('embarque-texto-bruto').textContent = r.textoBruto || '';
        document.getElementById('painel-embarque').style.display = '';
      })
      .catch(function (err) {
        btn.disabled = false;
        var m = tratarErro(err);
        if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
      });
  };
  reader.onerror = function () { btn.disabled = false; msg.innerHTML = '<div class="aviso erro">Falha ao ler o arquivo.</div>'; };
  reader.readAsDataURL(f);
}

function renderPreviewEmbarque(itens) {
  var wrap = document.getElementById('tabela-embarque');
  var body = itens.map(function (it, i) {
    var cls = it.ok ? '' : ' class="destaque"';
    var status = it.ok
      ? (it.motivo === 'aprendido' ? 'aprendido' : 'ok')
      : '<span class="sem-desc">' + (it.motivo || 'resolver') + '</span>';
    return '<tr' + cls + '>' +
      '<td><input class="item-emb obs-input" data-idx="' + i + '" list="itens-estoque-emb" value="' + escAttr(it.item || '') + '"></td>' +
      '<td style="text-align:right"><input type="number" class="qtd-emb obs-input" data-idx="' + i + '" value="' + (it.quantidade != null ? it.quantidade : '') + '" style="text-align:right"></td>' +
      '<td>' + (it.descricao || '—') + '</td>' +
      '<td>' + status + '</td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<table class="dados"><thead><tr>' +
      '<th style="width:24%">Item (col A)</th><th style="width:12%">Quantidade (col B)</th>' +
      '<th style="width:44%">Descrição no PDF</th><th style="width:20%">Status</th>' +
    '</tr></thead><tbody>' + body + '</tbody></table>';

  Array.prototype.forEach.call(wrap.querySelectorAll('.item-emb'), function (inp) {
    inp.addEventListener('input', function () { embarqueItens[Number(inp.getAttribute('data-idx'))].item = inp.value; });
  });
  Array.prototype.forEach.call(wrap.querySelectorAll('.qtd-emb'), function (inp) {
    inp.addEventListener('input', function () { embarqueItens[Number(inp.getAttribute('data-idx'))].quantidade = inp.value; });
  });
}

function gravarEmbarqueConfirmado() {
  var msg = document.getElementById('gravar-embarque-msg');
  var doc = document.getElementById('emb-doc').value.trim();
  var data = isoParaBR(document.getElementById('emb-data').value);
  if (!doc) { msg.innerHTML = '<div class="aviso erro">Informe o nº do embarque.</div>'; return; }
  if (!data) { msg.innerHTML = '<div class="aviso erro">Informe a data.</div>'; return; }
  var pendentes = embarqueItens.filter(function (it) { return !it.item || !String(it.item).trim(); });
  if (pendentes.length) {
    msg.innerHTML = '<div class="aviso erro">Há ' + pendentes.length + ' item(ns) sem código. Preencha antes de gravar.</div>';
    return;
  }
  var btn = document.getElementById('btn-gravar-embarque');
  btn.disabled = true;
  msg.innerHTML = '<div class="aviso"><span class="carregando">Gravando…</span></div>';
  chamar('gravarEmbarque', sessao.token, { doc: doc, data: data, itens: embarqueItens })
    .then(function (r) {
      btn.disabled = false;
      var extra = [];
      if (r.aprendidos) extra.push(r.aprendidos + ' descrição(ões) aprendida(s)');
      if (r.corrigidos) extra.push(r.corrigidos + ' aprendizado(s) corrigido(s)');
      msg.innerHTML = '<div class="aviso ok">' + r.gravados + ' item(ns) gravado(s) na aba EMBARQUES' +
        (extra.length ? ' — ' + extra.join(' e ') + '.' : '.') + '</div>';
      carregarUltimosEmbarques();
    })
    .catch(function (err) {
      btn.disabled = false;
      var m = tratarErro(err);
      if (m) msg.innerHTML = '<div class="aviso erro">' + m + '</div>';
    });
}

}
